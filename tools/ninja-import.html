<title>POE2 Tools - 忍者网配置解析</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#0f172a;
    --panel:#111827;
    --panel2:#172033;
    --text:#e5e7eb;
    --muted:#9ca3af;
    --line:#334155;
    --accent:#38bdf8;
    --ok:#34d399;
    --warn:#facc15;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Microsoft YaHei",sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header {
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    background:#0b1120;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  h1, h2, h3, p { margin:0; }
  h1 { font-size:20px; font-weight:650; }
  h2 { font-size:18px; font-weight:650; }
  h3 { font-size:15px; font-weight:650; }
  a { color:inherit; text-decoration:none; }
  .nav { display:flex; gap:8px; flex-wrap:wrap; }
  .btn {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:36px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:7px 12px;
    background:#0b1120;
    color:var(--text);
    font:inherit;
    font-size:14px;
    cursor:pointer;
  }
  .btn.primary { border-color:#0ea5e9; background:#075985; }
  .btn.disabled { color:var(--muted); cursor:not-allowed; opacity:.65; }
  .shell {
    width:min(1280px, calc(100% - 32px));
    margin:0 auto;
    padding:18px 0 34px;
    display:grid;
    gap:16px;
  }
  .panel {
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
    padding:16px;
    display:grid;
    gap:12px;
  }
  .grid {
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:12px;
  }
  .card {
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel2);
    padding:14px;
    display:grid;
    gap:8px;
  }
  textarea, select {
    width:100%;
    border:1px solid var(--line);
    border-radius:6px;
    background:#0b1120;
    color:var(--text);
    padding:10px;
    font:inherit;
  }
  textarea {
    min-height:220px;
    resize:vertical;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:13px;
  }
  .muted, li { color:var(--muted); line-height:1.55; }
  ul { margin:0; padding-left:20px; display:grid; gap:5px; }
  code, pre {
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    color:var(--accent);
  }
  pre {
    margin:0;
    overflow:auto;
    border:1px solid var(--line);
    border-radius:8px;
    background:#0b1120;
    padding:12px;
    max-height:360px;
  }
  #reportMarkdownBlock {
    max-height:520px;
    white-space:pre-wrap;
  }
  .inline-actions {
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .status {
    width:fit-content;
    border-radius:999px;
    padding:3px 8px;
    color:#0b1120;
    background:var(--ok);
    font-size:12px;
  }
  .warn { color:var(--warn); }
  .segmented {
    display:inline-flex;
    gap:4px;
    padding:4px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#0b1120;
  }
  .segmented button {
    min-height:30px;
    border:0;
    border-radius:6px;
    padding:5px 10px;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    font:inherit;
    font-size:13px;
  }
  .segmented button.active {
    background:#075985;
    color:var(--text);
  }
  .profile-tabs {
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .profile-tabs button {
    min-height:32px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 10px;
    background:#0b1120;
    color:var(--muted);
    cursor:pointer;
    font:inherit;
    font-size:13px;
  }
  .profile-tabs button.active {
    border-color:#0ea5e9;
    background:#075985;
    color:var(--text);
  }
  .profile-pane { display:none; }
  .profile-pane.active { display:grid; gap:12px; }
  .equipment-grid {
    display:grid;
    grid-template-columns:repeat(2, minmax(360px, 1fr));
    gap:12px;
  }
  .equipment-slot {
    border:1px solid var(--line);
    border-radius:8px;
    background:#0b1120;
    padding:10px;
    display:grid;
    gap:6px;
    min-height:112px;
  }
  .equipment-slot strong,
  .skill-group strong {
    color:var(--text);
  }
  .slot-name,
  .gem-meta {
    color:var(--muted);
    font-size:12px;
  }
  .mod-list,
  .gem-list {
    margin:0;
    padding-left:18px;
    display:grid;
    gap:3px;
  }
  .mod-list li {
    line-height:1.45;
    word-break:keep-all;
    overflow-wrap:break-word;
  }
  .skill-group {
    border:1px solid var(--line);
    border-radius:8px;
    background:#0b1120;
    padding:10px;
    display:grid;
    gap:8px;
  }
  .profile-stat-grid {
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:10px;
  }
  .profile-stat {
    border:1px solid var(--line);
    border-radius:8px;
    background:#0b1120;
    padding:10px;
  }
  .profile-stat strong {
    display:block;
    font-size:20px;
    color:var(--accent);
  }
  @media (max-width: 1100px) {
    .grid, .equipment-grid, .profile-stat-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<header>
  <h1 data-i18n="pageTitle">忍者网配置解析</h1>
  <nav class="nav">
    <a class="btn" href="../index.html" data-i18n="home">首页</a>
    <div class="segmented" aria-label="语言选择" data-i18n-aria="languageSelect">
      <button class="active" type="button" data-lang="zhCN">简体</button>
      <button type="button" data-lang="zhTW">繁体</button>
      <button type="button" data-lang="en">English</button>
    </div>
  </nav>
</header>

<main class="shell">
  <section class="panel">
    <span class="status" data-i18n="localParse">本地解析</span>
    <h2 data-i18n="importTitle">导入配置</h2>
    <p class="muted" data-i18n="importDesc">粘贴 poe.ninja、PoB 或玩家导出的 JSON/可解码文本。只在浏览器本地解析，并展示玩家装备、技能、天赋和宝石信息。</p>
    <div hidden>
      <select id="toolVersion">
        <option value="s05-tree-4.5" selected>S05 / Tree 4.5</option>
      </select>
      <select id="compareBuild">
        <option selected>读取中...</option>
      </select>
    </div>
    <div class="grid">
      <label><span data-i18n="sourceType">导入来源</span>
        <select id="sourceType">
          <option value="auto" selected data-i18n-option="auto">自动识别</option>
          <option value="json">JSON</option>
          <option value="base64-json">Base64 JSON</option>
          <option value="pob-code">压缩导入</option>
          <option value="pob-xml">构筑结构</option>
          <option value="text" data-i18n-option="text">文本探测</option>
        </select>
      </label>
    </div>
    <textarea id="input" spellcheck="false" placeholder='示例：{"version":"s05-tree-4.5","character":{"name":"Demo","class":"Mercenary","ascendancy":"Tactician"},"skills":[{"name":"Supporting Fire"}],"items":[{"slot":"Weapon","name":"Trenchtimbre"}],"passives":[6077,27296]}'></textarea>
    <div class="nav">
      <button class="btn primary" type="button" id="parseBtn" data-i18n="parse">解析</button>
      <button class="btn" type="button" id="clearBtn" data-i18n="clear">清空</button>
    </div>
  </section>

  <section class="grid">
    <article class="card">
      <h3 data-i18n="versionTitle">版本归属</h3>
      <ul id="versionResult">
        <li data-i18n="waiting">等待解析。</li>
      </ul>
    </article>
    <article class="card">
      <h3 data-i18n="summaryTitle">配置概览</h3>
      <ul id="summaryResult">
        <li data-i18n="waiting">等待解析。</li>
      </ul>
    </article>
  </section>

  <section class="panel" id="profileView">
    <div class="inline-actions">
      <h2 data-i18n="profileViewTitle">角色配置视图</h2>
      <span class="status" id="profileViewStatus" data-i18n="waiting">等待解析。</span>
    </div>
    <div class="profile-tabs" id="profileTabs" aria-label="角色配置视图">
      <button class="active" type="button" data-profile-tab="equipment" data-i18n="profileEquipmentTab">装备界面</button>
      <button type="button" data-profile-tab="skills" data-i18n="profileSkillsTab">技能界面</button>
      <button type="button" data-profile-tab="passives" data-i18n="profilePassivesTab">天赋界面</button>
      <button type="button" data-profile-tab="gems" data-i18n="profileGemsTab">宝石界面</button>
    </div>
    <div class="profile-pane active" id="profileEquipmentPane">
      <div class="equipment-grid" id="profileEquipmentGrid"></div>
    </div>
    <div class="profile-pane" id="profileSkillsPane">
      <div class="grid" id="profileSkillGroups"></div>
    </div>
    <div class="profile-pane" id="profilePassivesPane">
      <div class="profile-stat-grid" id="profilePassiveStats"></div>
      <div class="inline-actions" id="profilePassiveActions"></div>
    </div>
    <div class="profile-pane" id="profileGemsPane">
      <div class="profile-stat-grid" id="profileGemStats"></div>
      <div class="grid" id="profileGemGroups"></div>
    </div>
  </section>

</main>

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char]));
}

function localizedText(value, fallback = '') {
  if (!value || typeof value !== 'object') return value || fallback;
  return value[currentLang] || value.zhCN || value.zhTW || value.en || fallback;
}

function displayImportFormat(value) {
  const map = {
    json: { zhCN: 'JSON', zhTW: 'JSON', en: 'JSON' },
    'base64-json': { zhCN: 'Base64 JSON', zhTW: 'Base64 JSON', en: 'Base64 JSON' },
    'pob-code': { zhCN: '压缩导入', zhTW: '壓縮匯入', en: 'PoB code' },
    'pob-xml': { zhCN: '构筑结构', zhTW: '構築結構', en: 'PoB XML' },
    text: { zhCN: '文本探测', zhTW: '文字探測', en: 'Text probe' },
    none: { zhCN: '未解析', zhTW: '未解析', en: 'Not parsed' }
  };
  return localizedText(map[value], value || '');
}

function displayParserPath(value) {
  return String(value || '')
    .split(/\s*\/\s*|\s*,\s*/)
    .filter(Boolean)
    .map(displayParserToken)
    .join(' / ');
}

function displayCompatibilityWarning(value) {
  const text = String(value || '');
  if (text.startsWith('unsupported-version:')) return currentLang === 'zhTW' ? `暫不支援版本：${text.slice(20)}` : `暂不支持版本：${text.slice(20)}`;
  const mismatch = text.match(/^poe2db-version-mismatch:([^->]+)->(.+)$/);
  if (mismatch) {
    return currentLang === 'zhTW'
      ? `編年史資料版本不一致：${mismatch[1]} -> ${mismatch[2]}`
      : `编年史数据版本不一致：${mismatch[1]} -> ${mismatch[2]}`;
  }
  const exportMismatch = text.match(/^export-version-mismatch:([^->]+)->(.+)$/);
  if (exportMismatch) {
    return currentLang === 'zhTW'
      ? `匯出版本與工具版本不一致：${exportMismatch[1]} -> ${exportMismatch[2]}`
      : `导出版本与工具版本不一致：${exportMismatch[1]} -> ${exportMismatch[2]}`;
  }
  if (text === 'export-version-missing') return currentLang === 'zhTW' ? '匯出未提供版本' : '导出未提供版本';
  if (text.startsWith('season-mismatch:')) return currentLang === 'zhTW' ? `賽季不一致：${text.slice(16)}` : `赛季不一致：${text.slice(16)}`;
  return displayParserToken(text);
}

function displayToolVersion(value) {
  const text = String(value || '');
  const match = text.match(/^s(\d+)-tree-(.+)$/i);
  if (match && currentLang !== 'en') {

      : `赛季 ${season} / 编年史数据 ${match[2]}`;

  return text;
}

function displayDataVersion(value) {
  const text = String(value || '');
  if (!text) return '';
  return text.replace(/_/g, '.');
}

function localizeGemTierSuffix(name) {
  if (currentLang === 'en') return name || '';
  return String(name || '')
    .replace(/\s+III\b/g, currentLang === 'zhTW' ? ' 3 階' : ' 3阶')
    .replace(/\s+II\b/g, currentLang === 'zhTW' ? ' 2 階' : ' 2阶')

}

async function loadAnalysisContext(versions, versionId, requestedBuildId = null) {
  const version = window.POE2Versions.resolveVersion(versions, versionId);
  const manifest = await window.POE2Versions.readJson(`../${version.dataRoot}/manifest.json`);
  const buildEntries = manifest.builds || [];
  compareBuildOptions = await Promise.all(buildEntries.map(async (entry) => {
    try {
      const build = await window.POE2Versions.readJson(`../${version.dataRoot}/${entry.data}`);
      return { id: entry.id, title: build.title, entry, build };
    } catch (_) {
      return { id: entry.id, title: { zhCN: entry.id, zhTW: entry.id, en: entry.id }, entry, build: null };
    }
  }));
  const selectedBuildId = requestedBuildId || document.getElementById('compareBuild').value || compareBuildOptions[0]?.id;
  fillCompareBuildSelect(selectedBuildId);
  const selectedOption = compareBuildOptions.find((item) => item.id === selectedBuildId) || compareBuildOptions[0];
  const buildEntry = selectedOption?.entry;
  if (!buildEntry) {
    currentAnalysisContext = null;
    document.body.dataset.compareBuildCount = '0';
    return;
  }
  const build = selectedOption.build || await window.POE2Versions.readJson(`../${version.dataRoot}/${buildEntry.data}`);
  const buildRoutes = (manifest.tree?.routes || []).filter((item) => item.buildId === build.id);
  const route = buildRoutes.find((item) => item.stageId === 'endgame');
  let endgameNodeIds = [];
  if (route?.data) {
    const routeData = await window.POE2Versions.readJson(`../${version.dataRoot}/${route.data}`);
    endgameNodeIds = routeData.nodeIds || [];
  }
  const stageRoutes = await Promise.all(buildRoutes.map(async (item) => {
    try {
      const routeData = await window.POE2Versions.readJson(`../${version.dataRoot}/${item.data}`);
      return { ...item, nodeIds: routeData.nodeIds || [] };
    } catch (_) {
      return { ...item, nodeIds: [] };
    }
  }));
  const skillCatalog = manifest.skills?.catalog
    ? await window.POE2Versions.readJson(`../${version.dataRoot}/${manifest.skills.catalog}`)
    : null;
  const [uniqueItems, baseItems, itemDetails, modifiers, extraModifiers] = await Promise.all([
    manifest.reference?.items?.uniques
      ? window.POE2Versions.readJson(`../${version.dataRoot}/${manifest.reference.items.uniques}`).catch(() => null)
      : null,
    manifest.reference?.items?.baseItems
      ? window.POE2Versions.readJson(`../${version.dataRoot}/${manifest.reference.items.baseItems}`).catch(() => null)
      : null,
    manifest.reference?.items?.details
      ? window.POE2Versions.readJson(`../${version.dataRoot}/${manifest.reference.items.details}`).catch(() => null)
      : null,
    manifest.reference?.stats?.modifiers
      ? window.POE2Versions.readJson(`../${version.dataRoot}/${manifest.reference.stats.modifiers}`).catch(() => null)
      : null,
    manifest.reference?.stats?.extraModifiers
      ? window.POE2Versions.readJson(`../${version.dataRoot}/${manifest.reference.stats.extraModifiers}`).catch(() => null)
      : null
  ]);
  currentAnalysisContext = {
    version,
    manifest,
    buildEntry,
    build,
    endgameNodeIds,
    stageRoutes,
    skillCatalog,
    reference: { uniqueItems, baseItems, itemDetails, modifiers, extraModifiers }
  };
  document.body.dataset.compareBuildCount = String(compareBuildOptions.length);
  document.body.dataset.compareBuildId = build.id;
  document.body.dataset.ninjaReferenceUniqueItems = String(uniqueItems?.entries?.length || 0);
  document.body.dataset.ninjaReferenceBaseItems = String(baseItems?.entries?.length || 0);
  document.body.dataset.ninjaReferenceItemDetails = String(itemDetails?.entries?.length || 0);
  document.body.dataset.ninjaReferenceModifiers = String(modifiers?.entries?.length || 0);
  document.body.dataset.ninjaReferenceExtraModifiers = String(extraModifiers?.entries?.length || 0);
}

function asArray(value) {
  if (!value) return [];
  return Array.isArray(value) ? value : [value];
}

function tryParseJson(text) {
  return JSON.parse(text);
}

function tryParseBase64Json(text) {
  const decoded = new TextDecoder().decode(decodeBase64Bytes(text));
  return JSON.parse(decoded);
}

function normalizeEncodedPayload(text) {
  return text
    .trim()
    .replace(/^pob:\/\//i, '')
    .replace(/^pob-code:/i, '')
    .replace(/\s+/g, '');
}

function decodeBase64Bytes(text) {
  const normalized = normalizeEncodedPayload(text).replace(/-/g, '+').replace(/_/g, '/');
  const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=');
  const decoded = atob(padded);
  const bytes = new Uint8Array(decoded.length);
  for (let i = 0; i < decoded.length; i += 1) bytes[i] = decoded.charCodeAt(i);
  return bytes;
}

async function inflateBytes(bytes, format) {
  if (typeof DecompressionStream !== 'function') throw new Error('DecompressionStream is not available');
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream(format));
  const buffer = await new Response(stream).arrayBuffer();
  return new TextDecoder().decode(buffer);
}

function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('decompression timed out')), ms);
    promise.then(
      (value) => {
        clearTimeout(timer);
        resolve(value);
      },
      (error) => {
        clearTimeout(timer);
        reject(error);
      }
    );
  });
}

function xmlAttributes(node) {
  return Object.fromEntries(Array.from(node?.attributes || []).map((attr) => [attr.name, attr.value]));
}

function firstXmlNode(root, selectors) {
  for (const selector of selectors) {
    const node = root.querySelector(selector);
    if (node) return node;
  }
  return null;
}

function xmlAttr(node, names) {
  if (!node) return '';
  for (const name of names) {
    const value = node.getAttribute(name);
    if (value !== null && value !== '') return value;
  }
  return '';
}

function cssEscapeValue(value) {
  if (window.CSS?.escape) return CSS.escape(String(value));
  return String(value).replace(/["\\]/g, '\\$&');
}

function usefulItemLinesFromText(text) {
  const lines = String(text || '')
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean);
  return lines.filter((line) => !/^rarity:/i.test(line) && !/^--------+$/.test(line));
}

function itemNameFromXmlText(text) {
  const useful = usefulItemLinesFromText(text);
  return useful[0] || '';
}

function itemBaseTypeFromXmlText(text) {
  const useful = usefulItemLinesFromText(text);
  const candidate = useful[1] || '';
  if (/^(unique id|item level|levelreq|quality|sockets|rune|implicits):/i.test(candidate)) return '';
  return candidate;
}

function itemModLinesFromText(text) {
  const useful = String(text || '')
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean)
    .filter((line) => !/^rarity:/i.test(line) && !/^--------+$/.test(line))
    .filter((line) => !/^(unique id|item level|levelreq|implicits|note|variant|league|source):/i.test(line));
  return useful
    .slice(Math.min(2, useful.length))
    .filter((line) => /[+\-]?\d|%|minion|resistance|life|spirit|damage|attribute|movement|armour|evasion/i.test(line));
}

function arrayFromValue(value) {
  if (Array.isArray(value)) return value.flatMap(arrayFromValue);
  if (value === null || value === undefined) return [];
  if (typeof value === 'string' || typeof value === 'number') return [String(value)];
  if (typeof value === 'object') {
    return ['implicitMods', 'explicitMods', 'craftedMods', 'enchantMods', 'fracturedMods', 'mods']
      .flatMap((key) => arrayFromValue(value[key]));
  }
  return [];
}

function extractStatRollsFromMod(mod) {
  const text = String(mod || '').trim();
  const rolls = [];
  for (const match of text.matchAll(/[+\-]?\d+(?:\.\d+)?\s*%?/g)) {
    const raw = match[0].trim();
    rolls.push({
      value: Number(raw.replace('%', '')),
      unit: raw.includes('%') ? '%' : '',
      text
    });
  }
  return rolls.filter((roll) => Number.isFinite(roll.value));
}

function normalizeImportedItem(entry, fallbackRawText = '') {
  const rawText = entry?.rawText || entry?.text || fallbackRawText || '';
  const mods = [
    ...arrayFromValue(entry),
    ...itemModLinesFromText(rawText)
  ].map((line) => String(line).trim()).filter(Boolean);
  const uniqueMods = [...new Set(mods)];
  return {
    mods: uniqueMods,
    statRolls: uniqueMods.flatMap(extractStatRollsFromMod)
  };
}

function parsePobXmlText(xmlText) {
  if (typeof DOMParser !== 'function') throw new Error('DOMParser is not available');
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const parseError = doc.querySelector('parsererror');
  if (parseError) throw new Error('Invalid PoB XML payload');

  const root = doc.documentElement;
  const buildNode = firstXmlNode(doc, ['PathOfBuilding > Build', 'Build']);
  const treeNode = firstXmlNode(doc, ['PathOfBuilding > Tree', 'Tree']);
  const activeSpecId = xmlAttr(treeNode, ['activeSpec']);
  const specSelector = activeSpecId ? `Spec[treeVersion][id="${cssEscapeValue(activeSpecId)}"], Spec[id="${cssEscapeValue(activeSpecId)}"]` : 'Spec';
  const specNode = firstXmlNode(doc, [specSelector, 'Spec[treeVersion]', 'Spec']);
  const skillSetId = xmlAttr(firstXmlNode(doc, ['Skills']), ['activeSkillSet']);
  const skillSetSelector = skillSetId ? `SkillSet[id="${cssEscapeValue(skillSetId)}"]` : 'SkillSet';
  const skillSets = Array.from(doc.querySelectorAll(skillSetSelector));
  const selectedSkillSets = skillSets.length ? skillSets : Array.from(doc.querySelectorAll('SkillSet'));

  const skillGroups = selectedSkillSets.flatMap((skillSet, setIndex) => (
    Array.from(skillSet.querySelectorAll(':scope > Skill')).map((skill, groupIndex) => {
      const gems = Array.from(skill.querySelectorAll(':scope > Gem')).map((gem, gemIndex) => {
        const gemAttrs = xmlAttributes(gem);
        const name = xmlAttr(gem, ['nameSpec', 'name', 'skillId', 'gemId']);
        const explicitSupport = /^(true|1|yes)$/i.test(`${gemAttrs.support || gemAttrs.supportGem || gemAttrs.isSupport || ''}`)
          || /support/i.test(`${gemAttrs.gemType || gemAttrs.type || gemAttrs.role || ''}`);
        return {
          ...gemAttrs,
          name,
          support: explicitSupport || gemIndex > 0,
          enabled: xmlAttr(gem, ['enabled']) !== 'false'
        };
      }).filter((gem) => gem.name);
      return {
        id: xmlAttr(skill, ['id']) || `${setIndex + 1}-${groupIndex + 1}`,
        name: xmlAttr(skill, ['label', 'slot']) || `PoB Skill ${groupIndex + 1}`,
        slot: xmlAttr(skill, ['slot']) || xmlAttr(skillSet, ['title', 'id']) || `SkillSet ${setIndex + 1}`,
        activeSkill: gems.find((gem) => !gem.support) || gems[0] || null,
        gems
      };
    })
  )).filter((group) => group.gems.length);

  const itemsNode = firstXmlNode(doc, ['PathOfBuilding > Items', 'Items']);
  const activeItemSetId = xmlAttr(itemsNode, ['activeItemSet']);
  const itemSetSelector = activeItemSetId ? `ItemSet[id="${cssEscapeValue(activeItemSetId)}"]` : 'ItemSet';
  const itemSetNode = firstXmlNode(doc, [itemSetSelector, 'ItemSet']);
  const itemSlots = new Map();
  Array.from(itemSetNode?.querySelectorAll('Slot') || []).forEach((slot) => {
    const itemId = xmlAttr(slot, ['itemId', 'itemID', 'id']);
    const slotName = xmlAttr(slot, ['name', 'slot', 'inventoryId']);
    if (itemId && slotName) itemSlots.set(itemId, slotName);
  });
  const socketedJewels = new Map();
  Array.from(specNode?.querySelectorAll('Sockets > Socket') || []).forEach((socket) => {
    const itemId = xmlAttr(socket, ['itemId', 'itemID']);
    const nodeId = xmlAttr(socket, ['nodeId', 'nodeID', 'skill']);
    if (!itemId || itemId === '0') return;
    socketedJewels.set(itemId, {
      itemId,
      nodeId,
      slotName: nodeId ? `Jewel ${nodeId}` : 'Jewel'
    });
  });
  Array.from(itemSetNode?.querySelectorAll('SocketIdURL') || []).forEach((socket) => {
    const nodeId = xmlAttr(socket, ['nodeId', 'nodeID', 'skill']);
    const name = xmlAttr(socket, ['name']);
    for (const jewel of socketedJewels.values()) {
      if (nodeId && jewel.nodeId === nodeId && name) jewel.slotName = name;
    }
  });
  const items = Array.from(doc.querySelectorAll('Items > Item, Item')).map((item, index) => {
    const rawText = item.textContent || '';
    const itemAttrs = xmlAttributes(item);
    const itemId = xmlAttr(item, ['id', 'itemId', 'itemID']);
    const normalizedItem = normalizeImportedItem(itemAttrs, rawText);
    const socketedJewel = socketedJewels.get(itemId);
    return {
      ...itemAttrs,
      name: xmlAttr(item, ['name', 'typeLine', 'baseType']) || itemNameFromXmlText(rawText) || `PoB Item ${index + 1}`,
      baseType: xmlAttr(item, ['typeLine', 'baseType', 'base']) || itemBaseTypeFromXmlText(rawText),
      slot: xmlAttr(item, ['slot', 'inventoryId']) || itemSlots.get(itemId) || socketedJewel?.slotName || itemId || `Item ${index + 1}`,
      socketNodeId: socketedJewel?.nodeId || null,
      socketType: socketedJewel ? 'passive-tree-jewel' : null,
      mods: normalizedItem.mods,
      statRolls: normalizedItem.statRolls,
      rawText
    };
  }).filter((item) => item.name);

  const childPassiveIds = Array.from(specNode?.querySelectorAll('Nodes > Node, Nodes > AllocatedNode, Node[skill], Node[id], AllocatedNode[id]') || [])
    .map((node) => xmlAttr(node, ['id', 'skill', 'nodeId']));
  const passiveIds = normalizePassiveIds([
    ...String(xmlAttr(specNode, ['nodes', 'allocatedNodes', 'passives', 'nodeIds']))
      .split(/[,\s;|]+/)
      .filter(Boolean),
    ...childPassiveIds,
    ...extractPassiveIdsFromText(Array.from(specNode?.querySelectorAll('Nodes') || []).map((node) => node.textContent).join('\n')),
    ...extractPassiveIdsFromText(Array.from(doc.querySelectorAll('Tree URL, Spec URL, URL')).map((node) => node.textContent).join('\n'))
  ]);

  return {
    importFormatDetail: 'pob-xml',
    version: xmlAttr(root, ['dataVersion', 'version']) || xmlAttr(buildNode, ['dataVersion', 'version', 'treeVersion']) || null,
    season: xmlAttr(root, ['season', 'league']) || xmlAttr(buildNode, ['season', 'league']) || null,
    passiveTreeVersion: xmlAttr(specNode, ['treeVersion']) || null,
    poe2dbVersion: xmlAttr(buildNode, ['poe2dbVersion', 'passiveTreeVersion']) || null,
    character: {
      name: xmlAttr(buildNode, ['characterName', 'name', 'accountName']),
      class: xmlAttr(buildNode, ['className', 'class']),
      ascendancy: xmlAttr(buildNode, ['ascendClassName', 'ascendancyName', 'ascendancy']),
      level: xmlAttr(buildNode, ['level'])
    },
    skillGroups,
    items,
    passives: passiveIds,
    pobXml: {
      root: root?.nodeName || '',
      skillSets: selectedSkillSets.length,
      activeSkillSet: skillSetId || null,
      activeSpec: activeSpecId || null,
      activeItemSet: activeItemSetId || null,
      socketedJewels: Array.from(socketedJewels.values())
    }
  };
}

function looksLikeXml(text) {
  return /^\s*</.test(text || '');
}

async function tryParsePobCode(text) {
  const bytes = decodeBase64Bytes(text);
  const directText = new TextDecoder().decode(bytes);
  const candidates = [directText];
  for (const format of ['deflate', 'deflate-raw', 'gzip']) {
    try {
      candidates.push(await withTimeout(inflateBytes(bytes, format), 800));
    } catch (_) {
      // Try the next common PoB container format.
    }
  }
  for (const candidate of candidates) {
    try {
      return JSON.parse(candidate);
    } catch (_) {
      // Keep trying decoded variants before falling back to text mode.
    }
    if (looksLikeXml(candidate)) {
      try {
        return parsePobXmlText(candidate);
      } catch (_) {
        // Keep trying decoded variants before reporting an unsupported PoB payload.
      }
    }
  }
  throw new Error('Unsupported PoB code payload');
}

function findFirst(obj, keys) {
  if (!obj || typeof obj !== 'object') return undefined;
  for (const key of keys) {
    if (obj[key] !== undefined) return obj[key];
  }
  for (const value of Object.values(obj)) {
    if (value && typeof value === 'object') {
      const found = findFirst(value, keys);
      if (found !== undefined) return found;
    }
  }
  return undefined;
}

function findFirstWithPath(obj, keys, path = '') {
  if (!obj || typeof obj !== 'object') return null;
  for (const key of keys) {
    if (obj[key] !== undefined) return { value: obj[key], path: path ? `${path}.${key}` : key };
  }
  for (const [key, value] of Object.entries(obj)) {
    if (value && typeof value === 'object') {
      const found = findFirstWithPath(value, keys, path ? `${path}.${key}` : key);
      if (found) return found;
    }
  }
  return null;
}

function hasDeepKey(obj, key) {
  return Boolean(findFirstWithPath(obj, [key]));
}

function normalizeVersionToken(value) {
  return String(value || '').trim().toLowerCase();
}

function versionValue(data, keys) {
  const found = findFirstWithPath(data, keys);
  if (!found || found.value === undefined || found.value === null || typeof found.value === 'object') return null;
  return { value: String(found.value), path: found.path };
}

function selectedVersionInfo(selectedVersion, allowFallback = true) {
  const versionHistory = window.POE2Versions?.history(loadedVersions || {}) || [];
  const version = window.POE2Versions?.findVersion?.(loadedVersions || {}, selectedVersion)
    || (allowFallback ? (window.POE2Versions?.selectedVersion?.(loadedVersions || {}) || currentAnalysisContext?.version) : null)
    || null;
  const manifest = currentAnalysisContext?.manifest || null;
  return {
    id: version?.id || selectedVersion,
    season: version?.season || manifest?.season || manifest?.label || null,
    poe2dbVersion: version?.poe2dbPassiveTreeVersion || manifest?.tree?.poe2dbVersion || null,
    dataRoot: version?.dataRoot || null,
    knownVersionIds: versionHistory.flatMap((item) => [item.id, item.poe2dbPassiveTreeVersion, item.pobbTreeSvgVersion]).filter(Boolean),
    supported: Boolean(version)
  };
}

function buildVersionCompatibility(data, selectedVersion, explicitVersion) {
  const selected = selectedVersionInfo(explicitVersion || selectedVersion, !explicitVersion);
  const explicit = explicitVersion ? { value: String(explicitVersion), path: versionValue(data, ['version', 'treeVersion', 'leagueVersion', 'gameVersion', 'dataVersion'])?.path || 'version' } : null;
  const exportSeason = versionValue(data, ['season', 'league', 'challengeLeague']);
  const exportPoe2db = versionValue(data, ['poe2dbVersion', 'poe2dbPassiveTreeVersion', 'passiveTreeVersion', 'treeDataVersion']);
  const warnings = [];

  if (explicit?.value && !selected.supported) {
    warnings.push(`unsupported-version:${explicit.value}`);
  } else if (explicit?.value && normalizeVersionToken(explicit.value) !== normalizeVersionToken(selected.id)) {
    warnings.push(`export-version-mismatch:${explicit.value}->${selected.id}`);
  }
  if (explicit?.value && selected.supported && selected.knownVersionIds.length && !selected.knownVersionIds.includes(explicit.value)) {
    warnings.push(`export-version-not-registered:${explicit.value}`);
  }
  if (exportSeason?.value && selected.season && normalizeVersionToken(exportSeason.value) !== normalizeVersionToken(selected.season)) {
    warnings.push(`season-mismatch:${exportSeason.value}->${selected.season}`);
  }
  if (exportPoe2db?.value && selected.poe2dbVersion && normalizeVersionToken(exportPoe2db.value) !== normalizeVersionToken(selected.poe2dbVersion)) {
    warnings.push(`poe2db-version-mismatch:${exportPoe2db.value}->${selected.poe2dbVersion}`);
  }
  if (!explicit?.value && !exportSeason?.value && !exportPoe2db?.value) {
    warnings.push('export-version-missing');
  }

  return {
    status: warnings.length
      ? (warnings.some((warning) => warning.startsWith('unsupported-version:')) ? 'unsupported-version' : (warnings.includes('export-version-missing') && warnings.length === 1 ? 'source-version-unknown' : 'needs-review'))
      : 'matched',
    selectedToolVersion: selectedVersionInfo(selectedVersion).id,
    comparedVersion: selected.supported ? (currentAnalysisContext?.version?.id || selected.id) : null,
    selectedSeason: selected.season,
    selectedPoe2dbVersion: selected.poe2dbVersion,
    selectedDataRoot: selected.dataRoot,
    explicitVersion: explicit?.value || null,
    explicitVersionPath: explicit?.path || null,
    exportSeason: exportSeason?.value || null,
    exportSeasonPath: exportSeason?.path || null,
    exportPoe2dbVersion: exportPoe2db?.value || null,
    exportPoe2dbVersionPath: exportPoe2db?.path || null,
    warnings
  };
}

function importedKey(context, name) {
  return normalizeName(`${context}:${name}`);
}

function collectNamed(value, preferredKeys) {
  const out = [];
  const seen = new Set();
  function add(item, context = '') {
    if (!item) return;
    if (typeof item === 'string') {
      const key = context + item;
      if (!seen.has(key)) {
        seen.add(key);
        out.push({ name: item, context });
      }
      return;
    }
    if (typeof item !== 'object') return;
    const name = preferredKeys.map((key) => item[key]).find(Boolean);
    if (name) {
      const contextValue = item.slot || item.type || item.group || context;
      const key = contextValue + name;
      if (!seen.has(key)) {
        seen.add(key);
        out.push({ name, context: contextValue, raw: item });
      }
    }
  }
  function walk(node, context = '') {
    if (!node || typeof node !== 'object') return;
    if (Array.isArray(node)) {
      node.forEach((item) => {
        add(item, context);
        walk(item, context);
      });
      return;
    }
    for (const [key, child] of Object.entries(node)) {
      const nextContext = preferredKeys.includes(key) ? context : key;
      if (Array.isArray(child)) walk(child, nextContext);
    }
  }
  walk(value);
  return out;
}

function isSupportGem(entry, index) {
  const marker = String(entry?.kind || entry?.type || entry?.role || entry?.gemType || '').toLowerCase();
  if (entry?.support === true || entry?.isSupport === true || entry?.supportGem === true) return true;
  if (marker.includes('support')) return true;
  return index > 0 && !entry?.main && !entry?.active;
}

function gemName(entry) {
  if (typeof entry === 'string') return entry;
  if (!entry || typeof entry !== 'object') return '';
  return entry.name || entry.skill || entry.gem || entry.gemName || entry.displayName || entry.id || '';
}

function collectPobSkillGroups(value) {
  const found = findFirstWithPath(value, ['skillGroups', 'skillSets', 'skill_links']);
  const groups = Array.isArray(found?.value) ? found.value : [];
  const skills = [];
  const supports = [];
  const seenSkills = new Set();
  const seenSupports = new Set();
  for (const [groupIndex, group] of groups.entries()) {
    if (!group || typeof group !== 'object') continue;
    const gems = asArray(group.gems || group.skills || group.socketedGems || group.links).filter(Boolean);
    const groupName = group.label || group.name || group.title || group.slot || `skillGroup ${groupIndex + 1}`;
    let activeName = gemName(group.activeSkill || group.mainSkill || group.skill);
    gems.forEach((gem, index) => {
      const name = gemName(gem);
      if (!name) return;
      const support = isSupportGem(gem, index);
      if (!support && !activeName) activeName = name;
      if (support) {
        const key = importedKey(activeName || groupName, name);
        if (!seenSupports.has(key)) {
          seenSupports.add(key);
          supports.push({ name, context: activeName || groupName, raw: gem });
        }
      } else {
        const key = importedKey(groupName, name);
        if (!seenSkills.has(key)) {
          seenSkills.add(key);
          skills.push({ name, context: groupName, raw: gem });
        }
      }
    });
  }
  return {
    skills,
    supports,
    evidence: {
      detected: groups.length > 0,
      path: found?.path || '',
      groups: groups.length
    }
  };
}

function collectSkills(value) {
  const pobGroups = collectPobSkillGroups(value);
  const skills = [...pobGroups.skills];
  const supports = [...pobGroups.supports];
  const seenSkills = new Set();
  const seenSupports = new Set();
  skills.forEach((skill) => seenSkills.add(importedKey(skill.context, skill.name)));
  supports.forEach((support) => seenSupports.add(importedKey(support.context, support.name)));
  const source = findFirstWithPath(value, ['skills', 'skillGems', 'gems']);
  const sourceIsInsidePobGroups = pobGroups.evidence.detected && /^skillGroups|^skillSets|^skill_links/.test(source?.path || '');
  const entries = sourceIsInsidePobGroups
    ? []
    : Array.isArray(source?.value) ? source.value : asArray(source?.value);
  const addSupport = (support, context = '辅助') => {
    const supportName = gemName(support);
    const key = importedKey(context, supportName);
    if (supportName && !seenSupports.has(key)) {
      seenSupports.add(key);
      supports.push({ name: supportName, context, raw: support });
    }
  };
  for (const entry of entries) {
    if (typeof entry === 'string') {
      const key = importedKey('技能', entry);
      if (!seenSkills.has(key)) {
        seenSkills.add(key);
        skills.push({ name: entry, context: '技能' });
      }
      continue;
    }
    if (!entry || typeof entry !== 'object') continue;
    const name = gemName(entry);
    const key = importedKey(entry.group || entry.type || '技能', name);
    if (name && !seenSkills.has(key)) {
      seenSkills.add(key);
      skills.push({ name, context: entry.group || entry.type || '技能', raw: entry });
    }
    for (const support of asArray(entry.supports || entry.supportGems || entry.links)) {
      addSupport(support, name || '辅助');
    }
  }
  const topLevelSupports = Array.isArray(value?.supports)
    ? value.supports
    : Array.isArray(value?.supportGems)
      ? value.supportGems
      : [];
  topLevelSupports.forEach((support) => addSupport(support));
  return {
    skills,
    supports,
    evidence: {
      skillGroupsDetected: pobGroups.evidence.groups,
      skillGroupsPath: pobGroups.evidence.path,
      skillsSource: pobGroups.evidence.detected ? pobGroups.evidence.path : source?.path || '',
      supportsSource: [
        pobGroups.evidence.detected ? pobGroups.evidence.path : '',
        hasDeepKey(value, 'supports') ? 'supports' : '',
        hasDeepKey(value, 'supportGems') ? 'supportGems' : ''
      ].filter(Boolean).join(', ') || source?.path || ''
    }
  };
}

function collectItems(data) {
  const source = findFirstWithPath(data, ['items', 'equipment', 'gear']);
  const value = source?.value;
  if (Array.isArray(value)) {
    const items = [];
    const seen = new Set();
    value.forEach((entry) => {
      if (!entry || typeof entry !== 'object') return;
      const name = entry.name || entry.item || entry.baseType || entry.typeLine;
      if (!name) return;
      const context = entry.slot || entry.inventoryId || entry.type || entry.category || source.path;
      const key = importedKey(context, name);
      if (seen.has(key)) return;
      seen.add(key);
      const normalizedItem = normalizeImportedItem(entry);
      const baseType = entry.typeLine || entry.baseType || entry.base || itemBaseTypeFromXmlText(entry.rawText || entry.text || '');
      items.push({
        name,
        baseType,
        context,
        slot: entry.slot || context,
        socketNodeId: entry.socketNodeId || null,
        socketType: entry.socketType || null,
        raw: entry,
        mods: normalizedItem.mods,
        statRolls: normalizedItem.statRolls
      });
    });
    return { items, sourcePath: source.path };
  }
  return {
    items: collectNamed(value || data, ['name', 'item']),
    sourcePath: source?.path || 'recursive-scan'
  };
}

function collectSocketedJewels(items) {
  return (items || []).filter((item) => (
    item?.socketType === 'passive-tree-jewel'
    || /^jewel\s+\d+$/i.test(String(item?.context || item?.slot || ''))
  ));
}

function normalizePassiveIds(values) {
  const seen = new Set();
  return values
    .map((value) => Number(String(value).replace(/^n/i, '')))
    .filter((id) => Number.isInteger(id) && id > 0 && !seen.has(id) && seen.add(id));
}

function extractPassiveIdsFromText(text) {
  const ids = [];
  const source = String(text || '');
  const patterns = [
    /(?:[?&]nodes=)([0-9nN,%\s;|]+)/g,
    /(?:passives|passiveIds|allocatedNodes|nodeIds)\s*[:=]\s*\[?([0-9nN,\s;|]+)\]?/gi
  ];
  for (const pattern of patterns) {
    for (const match of source.matchAll(pattern)) {
      ids.push(...String(match[1]).split(/[,\s;%|]+/).filter(Boolean));
    }
  }
  return normalizePassiveIds(ids);
}

function extractPassiveIds(obj) {
  if (obj?.rawText) return extractPassiveIdsFromText(obj.rawText);
  const candidates = [
    findFirst(obj, ['passives']),
    findFirst(obj, ['passiveTree']),
    findFirst(obj, ['allocatedNodes']),
    findFirst(obj, ['nodeIds'])
  ];
  for (const candidate of candidates) {
    if (Array.isArray(candidate)) {
      return normalizePassiveIds(candidate);
    }
    if (candidate && Array.isArray(candidate.nodeIds)) {
      return normalizePassiveIds(candidate.nodeIds);
    }
    if (typeof candidate === 'string') return extractPassiveIdsFromText(candidate);
  }
  return [];
}

function passiveSourceLabel(obj, format) {
  if (obj?.rawText || format === 'text') return 'text-patterns';
  const found = findFirstWithPath(obj, ['passives', 'passiveTree', 'allocatedNodes', 'nodeIds']);
  return found?.path || '';
}

function buildFormatProfile(data, parsed, explicitVersion, versionCompatibility, skillGroups, itemGroups, passiveIds) {
  const topLevelKeys = data && typeof data === 'object' && !Array.isArray(data) ? Object.keys(data).slice(0, 40) : [];
  const characterPath = findFirstWithPath(data, ['character'])?.path || '';
  const passivePath = passiveSourceLabel(data, parsed.format) || '';
  const parserHints = [
    skillGroups.evidence.skillGroupsDetected ? 'pob-skill-groups' : '',
    parsed.format === 'text' ? 'text-passive-patterns' : '',
    parsed.format === 'pob-code' ? 'pob-compressed-code' : '',
    data?.importFormatDetail === 'pob-xml' ? 'pob-xml' : '',
    itemGroups.sourcePath ? 'gear-container' : ''
  ].filter(Boolean);
  const risks = [
    !explicitVersion ? 'missing-explicit-version' : '',
    versionCompatibility.status !== 'matched' ? `version-${versionCompatibility.status}` : '',
    !skillGroups.skills.length ? 'no-active-skills-detected' : '',
    !skillGroups.supports.length ? 'no-support-gems-detected' : '',
    !itemGroups.items.length ? 'no-items-detected' : '',
    !passiveIds.length ? 'no-passives-detected' : '',
    itemGroups.sourcePath === 'recursive-scan' ? 'items-from-recursive-scan' : '',
    parsed.format === 'text' ? 'text-mode-limited-structure' : ''
  ].filter(Boolean);
  return {
    inputFormat: parsed.format,
    topLevelKeys,
    explicitVersionPath: explicitVersion
      ? (versionValue(data, ['version', 'treeVersion', 'leagueVersion', 'gameVersion', 'dataVersion'])?.path || 'version')
      : null,
    characterPath: characterPath || null,
    skillGroupPath: skillGroups.evidence.skillGroupsPath || null,
    skillGroupCount: skillGroups.evidence.skillGroupsDetected || 0,
    skillSourcePath: skillGroups.evidence.skillsSource || null,
    supportSourcePath: skillGroups.evidence.supportsSource || null,
    itemSourcePath: itemGroups.sourcePath || null,
    passiveSourcePath: passivePath || null,
    recognizedCounts: {
      skills: skillGroups.skills.length,
      supports: skillGroups.supports.length,
      items: itemGroups.items.length,
      passives: passiveIds.length
    },
    parserHints,
    risks
  };
}

function normalizeName(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, '');
}

function localizedValues(value) {
  if (!value || typeof value !== 'object') return [];
  return [value.zhCN, value.zhTW, value.en].filter(Boolean);
}

function pushAlias(aliases, value) {
  if (value === null || value === undefined) return;
  const text = String(value).trim();
  if (!text) return;
  aliases.push(text);
  const tail = text.split(/[/?#]/).filter(Boolean).pop();
  if (tail && tail !== text) aliases.push(decodeURIComponent(tail));
  aliases.push(text.replace(/[_-]+/g, ' '));
}

function uniqueAliases(values) {
  const seen = new Set();
  return values.filter((value) => {
    const normalized = normalizeName(value);
    if (!normalized || seen.has(normalized)) return false;
    seen.add(normalized);
    return true;
  });
}

function catalogEntryAliases(entry) {
  if (!entry) return [];
  const aliases = [];
  pushAlias(aliases, entry.id);
  localizedValues(entry.name).forEach((name) => pushAlias(aliases, name));
  pushAlias(aliases, entry.poe2db?.href);
  pushAlias(aliases, entry.acquisition?.sourceRef);
  pushAlias(aliases, entry.supportRequirements?.sourceRef);
  return uniqueAliases(aliases);
}

function catalogEntryOfficialNames(entry) {
  return uniqueAliases(localizedValues(entry?.name || {}));
}

function nameMatches(importedNames, expectedNames) {
  const imported = importedNames.map(normalizeName).filter(Boolean);
  return expectedNames.some((expected) => {
    const normalized = normalizeName(expected);
    return normalized && imported.some((name) => name.includes(normalized) || normalized.includes(name));
  });
}

function nameMatchesExactly(importedNames, expectedNames) {
  const imported = importedNames.map(normalizeName).filter(Boolean);
  return expectedNames.some((expected) => {
    const normalized = normalizeName(expected);
    return normalized && imported.includes(normalized);
  });
}

function catalogEntriesByKind(catalog, kind) {
  return (catalog?.entries || []).filter((entry) => entry.kind === kind);
}

function findCatalogEntryById(catalog, kind, id) {
  if (!id) return null;
  return catalogEntriesByKind(catalog, kind).find((entry) => normalizeName(entry.id) === normalizeName(id)) || null;
}

function findCatalogMatch(name, entries) {
  for (const entry of entries) {
    if (nameMatchesExactly([name], catalogEntryOfficialNames(entry))) {
      return { entry, aliasMatched: false };
    }
  }
  for (const entry of entries) {
    if (nameMatchesExactly([name], catalogEntryAliases(entry))) {
      return { entry, aliasMatched: true };
    }
  }
  for (const entry of entries) {
    const officialMatched = nameMatches([name], catalogEntryOfficialNames(entry));
    if (officialMatched) {
      return { entry, aliasMatched: false };
    }
  }
  for (const entry of entries) {
    if (nameMatches([name], catalogEntryAliases(entry))) {
      return { entry, aliasMatched: true };
    }
  }
  return { entry: null, aliasMatched: false };
}

function importedGemDisplayName(name, kind) {
  const catalog = currentAnalysisContext?.skillCatalog;
  const fallback = name || '';
  if (!catalog || !fallback) return localizeGemTierSuffix(fallback);
  const match = findCatalogMatch(fallback, catalogEntriesByKind(catalog, kind));
  return localizeGemTierSuffix(localizedText(match.entry?.name, fallback));
}

function importedGemDisplayNameAnyKind(name) {
  const catalog = currentAnalysisContext?.skillCatalog;
  const fallback = name || '';
  if (!catalog || !fallback) return localizeGemTierSuffix(fallback);
  for (const kind of ['active', 'support']) {
    const match = findCatalogMatch(fallback, catalogEntriesByKind(catalog, kind));
    if (match.entry) return localizeGemTierSuffix(localizedText(match.entry.name, fallback));
  }
  return localizeGemTierSuffix(fallback);
}

function localizeKnownEnglishNamesInLine(value) {
  if (currentLang === 'en') return value || '';
  let text = String(value || '');
  const catalog = currentAnalysisContext?.skillCatalog;
  if (catalog?.entries?.length) {
    const entries = [...catalogEntriesByKind(catalog, 'active'), ...catalogEntriesByKind(catalog, 'support')]
      .filter((entry) => entry?.name?.en && entry.name[currentLang]);
    entries
      .sort((a, b) => String(b.name.en).length - String(a.name.en).length)
      .forEach((entry) => {
        const en = String(entry.name.en).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        text = text.replace(new RegExp(`\\b${en}\\b`, 'g'), localizeGemTierSuffix(entry.name[currentLang]));
      });
  }
  return localizeGemTierSuffix(text);
}

function localizedField(value, fallback = '') {
  if (!value || typeof value !== 'object') return value || fallback;
  return value[currentLang] || value.zhCN || value.zhTW || value.en || fallback;
}

function referenceItemAliases(entry, { includeTypeLine = true } = {}) {
  const aliases = [];
  pushAlias(aliases, entry?.id);
  localizedValues(entry?.name).forEach((name) => pushAlias(aliases, name));
  if (includeTypeLine) localizedValues(entry?.typeLine).forEach((name) => pushAlias(aliases, name));
  Object.values(entry?.sourceRef || {}).forEach((ref) => pushAlias(aliases, ref));
  return uniqueAliases(aliases);
}

function itemImportedNameCandidates(item) {
  const raw = item?.raw || {};
  return uniqueAliases([
    item?.name,
    raw.name,
    raw.item,
    itemNameFromXmlText(raw.rawText || raw.text || '')
  ].filter(Boolean));
}

function itemImportedBaseCandidates(item) {
  const raw = item?.raw || {};
  return uniqueAliases([
    item?.baseType,
    item?.typeLine,
    raw.typeLine,
    raw.baseType,
    raw.base,
    itemBaseTypeFromXmlText(raw.rawText || raw.text || '')
  ].filter(Boolean));
}

function itemImportedSearchCandidates(item) {
  return uniqueAliases([
    ...itemImportedNameCandidates(item),
    ...itemImportedBaseCandidates(item)
  ]);
}

function findContainedBaseReference(item) {
  const imported = itemImportedSearchCandidates(item).map(normalizeName).filter(Boolean);
  if (!imported.length) return null;
  let best = null;
  for (const entry of referenceItemEntries('base')) {
    const aliases = referenceItemAliases(entry, { includeTypeLine: true })
      .map((alias) => ({ raw: alias, normalized: normalizeName(alias) }))
      .filter((alias) => alias.normalized && alias.normalized.length >= 5);
    const matched = aliases
      .filter((alias) => imported.some((name) => name.includes(alias.normalized) || alias.normalized.includes(name)))
      .sort((a, b) => b.normalized.length - a.normalized.length)[0];
    if (matched && (!best || matched.normalized.length > best.score)) {
      best = { entry, score: matched.normalized.length };
    }
  }
  return best?.entry || null;
}

function findReferenceItemByNames(names, entries, options = {}) {
  const normalizedNames = names.map(normalizeName).filter(Boolean);
  if (!normalizedNames.length) return null;
  for (const entry of entries) {
    const aliases = referenceItemAliases(entry, options).map(normalizeName).filter(Boolean);
    if (aliases.some((alias) => normalizedNames.includes(alias))) return entry;
  }
  for (const entry of entries) {
    const aliases = referenceItemAliases(entry, options).map(normalizeName).filter(Boolean);
    if (aliases.some((alias) => normalizedNames.some((name) => name.includes(alias) || alias.includes(name)))) return entry;
  }
  return null;
}

function findImportedItemReference(item) {
  const names = itemImportedNameCandidates(item);
  const unique = findReferenceItemByNames(names, referenceItemEntries('unique'), { includeTypeLine: false });
  if (unique) return { entry: unique, kind: 'unique' };
  const base = findReferenceItemByNames([...names, ...itemImportedBaseCandidates(item)], referenceItemEntries('base'), { includeTypeLine: true })
    || findContainedBaseReference(item);
  if (base) return { entry: base, kind: 'base' };
  return { entry: null, kind: '' };
}

function importedItemRarityDisplayName(item) {
  const rarity = item?.rarity || item?.raw?.rarity || String(item?.raw?.rawText || '').match(/Rarity:\s*([^\n]+)/i)?.[1] || '';
  const map = {
    UNIQUE: { zhCN: '暗金', zhTW: '傳奇', en: 'Unique' },
    RARE: { zhCN: '稀有', zhTW: '稀有', en: 'Rare' },
    MAGIC: { zhCN: '魔法', zhTW: '魔法', en: 'Magic' },
    NORMAL: { zhCN: '普通', zhTW: '普通', en: 'Normal' }
  };
  return localizedText(map[String(rarity).trim().toUpperCase()], rarity);
}

function localizedImportedBaseNameFromText(item) {
  const candidates = itemImportedSearchCandidates(item).map(normalizeName).filter(Boolean);
  if (!candidates.length) return '';
  const baseAliases = [
    { en: 'Silver Charm', zhCN: '真银咒符', zhTW: '白銀護符' },
    { en: 'Golden Charm', zhCN: '黄金咒符', zhTW: '黃金護符' },
    { en: 'Sapphire Charm', zhCN: '蓝玉咒符', zhTW: '藍玉護符' },
    { en: 'Thawing Charm', zhCN: '融冰咒符', zhTW: '解凍護符' },
    { en: 'Diamond', zhCN: '宝钻', zhTW: '鑽石' },
    { en: 'Sapphire', zhCN: '蓝玉', zhTW: '藍寶石' },
    { en: 'Emerald', zhCN: '翡翠', zhTW: '綠寶石' },
    { en: 'Time-Lost Emerald', zhCN: '失落的翡翠', zhTW: '時迭綠寶石' },
    { en: 'Time-Lost Diamond', zhCN: '失落的宝钻', zhTW: '時迭鑽石' }
  ].sort((a, b) => normalizeName(b.en).length - normalizeName(a.en).length);
  const match = baseAliases.find((entry) => {
    const alias = normalizeName(entry.en);
    return alias && candidates.some((candidate) => candidate.includes(alias) || alias.includes(candidate));
  });
  return localizedText(match, '');
}

function importedItemDisplayName(item) {
  const fallback = item?.name || '';
  const match = findImportedItemReference(item);
  if (!match.entry) {
    const localizedBase = localizedImportedBaseNameFromText(item);
    if (localizedBase && currentLang !== 'en') {
      const rarity = importedItemRarityDisplayName(item);
      return rarity ? `${rarity}：${localizedBase}` : localizedBase;
    }
    if (currentLang !== 'en' && /[A-Za-z]{3,}/.test(fallback)) {
      const rarity = importedItemRarityDisplayName(item);
      return rarity ? `${rarity}装备` : (currentLang === 'zhTW' ? '未匹配裝備' : '未匹配装备');
    }
    return fallback;
  }
  const localizedName = localizedField(match.entry.name, fallback);
  if (match.kind === 'unique') return localizedName;
  if (normalizeName(fallback) === normalizeName(match.entry.name?.en)) return localizedName;
  if (currentLang !== 'en') {
    const rarity = importedItemRarityDisplayName(item);
    return rarity ? `${rarity}：${localizedName}` : localizedName;
  }
  return fallback;
}

function importedItemBaseDisplayName(item) {
  const match = findImportedItemReference(item);
  const localizedBaseFromText = localizedImportedBaseNameFromText(item);
  if (!match.entry) {
    const fallback = item?.baseType || item?.raw?.typeLine || item?.raw?.baseType || '';
    if (localizedBaseFromText) return localizedBaseFromText;
    if (currentLang !== 'en' && /[A-Za-z]{3,}/.test(fallback)) return '';
    return /^unique id:/i.test(String(fallback)) ? '' : fallback;
  }
  if (match.kind === 'unique') return localizedField(match.entry.typeLine, item?.baseType || '');
  return localizedField(match.entry.name, item?.baseType || '');
}

function itemDetailEntries() {
  return currentAnalysisContext?.reference?.itemDetails?.entries || [];
}

function findItemDetailById(id) {
  if (!id) return null;
  return itemDetailEntries().find((entry) => normalizeName(entry.id) === normalizeName(id)) || null;
}

function normalizedModPattern(value) {
  return cleanModLookupText(value)
    .toLowerCase()
    .replace(/\b(all equipment|ruby prefix|ruby suffix|sapphire prefix|sapphire suffix|emerald prefix|emerald suffix|diamond prefix|diamond suffix|boots|gloves|helmets?|body armou?rs?|sceptres?|quarterstaves|martial weapon|caster weapon|one handed melee weapon|two handed melee weapon|crossbow|bow|shields? and bucklers?)\s*:\s*/g, '')
    .replace(/\b(resistances|resistance)\b/g, 'resistance')
    .replace(/\b(enemies|enemy)\b/g, 'enemy')
    .replace(/\b(attacks|attack)\b/g, 'attack')
    .replace(/\b(charms|charm)\b/g, 'charm')
    .replace(/\b(flasks|flask)\b/g, 'flask')
    .replace(/\b(skills|skill)\b/g, 'skill')
    .replace(/\([+\-]?\d+(?:\.\d+)?\s*[–—-]\s*[+\-]?\d+(?:\.\d+)?\)/g, '#')
    .replace(/[+\-]?\d+(?:\.\d+)?\s*[–—-]\s*[+\-]?\d+(?:\.\d+)?/g, '#')
    .replace(/[+\-]?\d+(?:\.\d+)?/g, '#')
    .replace(/[^a-z\u4e00-\u9fff#]+/g, '');
}

function cleanModLookupText(value) {
  return String(value || '')
    .replace(/\{[^}]+\}/g, ' ')
    .replace(/\bBonded:\s*/i, '')
    .replace(/\s*,\s*$/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function numericTokenRegex() {
  return /[+\-]?\([+\-]?\d+(?:\.\d+)?\s*[–—-]\s*[+\-]?\d+(?:\.\d+)?\)(?:\s*%)?|[+\-]?\d+(?:\.\d+)?(?:\s*%)?/g;
}

function normalizeNumericToken(value) {
  return String(value || '')
    .replace(/[()]/g, '')
    .replace(/[–—]/g, '-')
    .replace(/\s+/g, ' ')
    .trim();
}

function numericTokensFromLine(value) {
  return [...String(value || '').matchAll(numericTokenRegex())].map((match) => normalizeNumericToken(match[0]));
}

function applyImportedValuesToLocalizedTemplate(importedLine, localizedTemplate) {
  const importedTokens = numericTokensFromLine(cleanModLookupText(importedLine));
  if (!importedTokens.length) return localizedTemplate;
  let tokenIndex = 0;
  return String(localizedTemplate || '').replace(numericTokenRegex(), (token) => {
    let imported = importedTokens[tokenIndex];
    tokenIndex += 1;
    if (!imported) return token;
    const wantsPercentAfter = /%\s*$/.test(token) && !/%\s*$/.test(imported);
    return `${imported}${wantsPercentAfter ? ' %' : ''}`;
  });
}

function modSourcePrefix(value) {
  const text = String(value || '');
  const labels = {
    zhCN: {
      desecrated: '渎灵',
      rune: '符文',
      enchant: '附魔',
      bonded: '绑定'
    },
    zhTW: {
      desecrated: '褻瀆',
      rune: '符文',
      enchant: '附魔',
      bonded: '綁定'
    }
  };
  const label = labels[currentLang] || labels.zhCN;
  const parts = [];
  if (/\{desecrated\}/i.test(text)) parts.push(label.desecrated);
  if (/\{rune\}/i.test(text)) parts.push(label.rune);
  else if (/\{enchant\}/i.test(text)) parts.push(label.enchant);
  if (/\bBonded:\s*/i.test(text)) parts.push(label.bonded);
  return parts.length ? `${parts.join(' / ')}：` : '';
}

function localizedModRowsFromEntry(entry) {
  const rows = [];
  const en = entry?.mods?.en || [];
  const zhCN = entry?.mods?.zhCN || [];
  const zhTW = entry?.mods?.zhTW || [];
  en.forEach((mod, modIndex) => {
    const enLines = String(mod || '').split('\n').map((line) => line.trim()).filter(Boolean);
    const cnLines = String(zhCN[modIndex] || '').split('\n').map((line) => line.trim()).filter(Boolean);
    const twLines = String(zhTW[modIndex] || '').split('\n').map((line) => line.trim()).filter(Boolean);
    enLines.forEach((line, lineIndex) => {
      rows.push({
        en: line,
        zhCN: cnLines[lineIndex] || cnLines.join(' / ') || line,
        zhTW: twLines[lineIndex] || twLines.join(' / ') || line
      });
    });
  });
  return rows;
}

function localizedRowsFromLines(lines) {
  const rows = [];
  const en = lines?.en || [];
  const zhCN = lines?.zhCN || [];
  const zhTW = lines?.zhTW || [];
  en.forEach((line, index) => {
    const enLines = String(line || '').split('\n').map((item) => item.trim()).filter(Boolean);
    const cnLines = String(zhCN[index] || '').split('\n').map((item) => item.trim()).filter(Boolean);
    const twLines = String(zhTW[index] || '').split('\n').map((item) => item.trim()).filter(Boolean);
    enLines.forEach((enLine, lineIndex) => {
      rows.push({
        en: enLine,
        zhCN: cnLines[lineIndex] || cnLines.join(' / ') || enLine,
        zhTW: twLines[lineIndex] || twLines.join(' / ') || enLine
      });
    });
  });
  return rows;
}

function localizedRowsFromItemDetail(detail) {
  if (!detail) return [];
  return [
    ...localizedRowsFromLines(detail.properties),
    ...localizedRowsFromLines(detail.mods)
  ];
}

function localizedRowsFromReferenceItem(entry) {
  if (!entry) return [];
  return [
    ...localizedRowsFromLines(entry.properties),
    ...localizedRowsFromLines(entry.mods)
  ];
}

function globalModifierRows() {
  const modifierRows = [
    ...(currentAnalysisContext?.reference?.modifiers?.entries || []),
    ...(currentAnalysisContext?.reference?.extraModifiers?.entries || [])
  ].flatMap((entry) => {
    const enLines = String(entry.description?.en || '').split('\n').map((line) => line.trim()).filter(Boolean);
    const cnLines = String(entry.description?.zhCN || '').split('\n').map((line) => line.trim()).filter(Boolean);
    const twLines = String(entry.description?.zhTW || '').split('\n').map((line) => line.trim()).filter(Boolean);
    return enLines.map((line, index) => ({
      en: line,
      zhCN: cnLines[index] || line,
      zhTW: twLines[index] || line
    }));
  });
  return [
    ...modifierRows,
    ...itemDetailEntries().flatMap(localizedRowsFromItemDetail),
    ...referenceItemEntries('unique').flatMap(localizedRowsFromReferenceItem),
    ...referenceItemEntries('base').flatMap(localizedRowsFromReferenceItem)
  ];
}

function extraModifierRows() {
  return (currentAnalysisContext?.reference?.extraModifiers?.entries || []).flatMap((entry) => {
    const enLines = String(entry.description?.en || '').split('\n').map((line) => line.trim()).filter(Boolean);
    const cnLines = String(entry.description?.zhCN || '').split('\n').map((line) => line.trim()).filter(Boolean);
    const twLines = String(entry.description?.zhTW || '').split('\n').map((line) => line.trim()).filter(Boolean);
    return enLines.map((line, index) => ({
      en: line,
      zhCN: cnLines[index] || line,
      zhTW: twLines[index] || line
    }));
  });
}

function findLocalizedModLine(mod, rows, { allowPartial = true } = {}) {
  const importedPattern = normalizedModPattern(mod);
  if (!importedPattern) return null;
  const exact = rows.find((row) => normalizedModPattern(row.en) === importedPattern);
  if (exact || !allowPartial) return exact || null;
  const partial = rows.find((row) => {
      const pattern = normalizedModPattern(row.en);
      if (!pattern || pattern === '#') return false;
      if (importedPattern.includes(pattern) || pattern.includes(importedPattern)) return true;
      const shorter = importedPattern.length < pattern.length ? importedPattern : pattern;
      const longer = importedPattern.length < pattern.length ? pattern : importedPattern;
      return shorter.length >= 12 && longer.includes(shorter);
    })
    || null;
  return partial;
}

function importedItemModDisplayLine(mod, item) {
  if (currentLang === 'en') return mod;
  const itemMatch = findImportedItemReference(item);
  const itemDetail = findItemDetailById(itemMatch.entry?.id);
  const baseDetail = findItemDetailById(findReferenceItemByNames(itemImportedBaseCandidates(item), referenceItemEntries('base'), { includeTypeLine: true })?.id);
  const itemRows = localizedModRowsFromEntry(itemMatch.entry);
  const detailRows = [
    ...localizedRowsFromItemDetail(itemDetail),
    ...localizedRowsFromItemDetail(baseDetail)
  ];
  const row = findLocalizedModLine(mod, detailRows, { allowPartial: false })
    || findLocalizedModLine(mod, itemRows, { allowPartial: false })
    || findLocalizedModLine(mod, extraModifierRows(), { allowPartial: false })
    || findLocalizedModLine(mod, globalModifierRows(), { allowPartial: false });
  if (row?.[currentLang]) {
    return `${modSourcePrefix(mod)}${localizeKnownEnglishNamesInLine(applyImportedValuesToLocalizedTemplate(mod, row[currentLang]))}`;
  }
  const fallback = localizeKnownEnglishNamesInLine(translateKnownItemStatLine(mod));
  if (currentLang !== 'en' && /[A-Za-z]{3,}/.test(fallback)) {
    const tokens = numericTokensFromLine(mod).join(' / ');
    const label = currentLang === 'zhTW' ? '未匹配詞綴' : '未匹配词缀';
    const suffix = tokens ? `：${tokens}` : (currentLang === 'zhTW' ? '（待補資料）' : '（待补数据）');
    return `${modSourcePrefix(mod)}${label}${suffix}`;
  }
  return fallback;
}

function compareWithCatalog(result, catalog) {
  if (!catalog) return null;
  const activeEntries = catalogEntriesByKind(catalog, 'active');
  const supportEntries = catalogEntriesByKind(catalog, 'support');
  const skillMatches = result.skills.map((item) => ({ imported: item, ...findCatalogMatch(item.name, activeEntries) }));
  const supportMatches = result.supports.map((item) => ({ imported: item, ...findCatalogMatch(item.name, supportEntries) }));
  const pendingEntries = [...skillMatches, ...supportMatches]
    .map((match) => match.entry)
    .filter((entry) => entry && entry.verificationStatus !== 'verified');
  return {
    sourceType: catalog.source?.type || '',
    skills: {
      matched: skillMatches.filter((match) => match.entry).length,
      imported: result.skills.length,
      unknown: skillMatches.filter((match) => !match.entry).map((match) => match.imported.name)
    },
    supports: {
      matched: supportMatches.filter((match) => match.entry).length,
      imported: result.supports.length,
      unknown: supportMatches.filter((match) => !match.entry).map((match) => match.imported.name)
    },
    aliasMatched: [...skillMatches, ...supportMatches].filter((match) => match.entry && match.aliasMatched).length,
    pendingVerification: [...new Set(pendingEntries.map((entry) => entry.id))].length
  };
}

function gearKeywords(build) {
  const keywords = [];
  for (const gear of build.gearPriorities || []) {
    const text = gear.endgame || '';
    const parens = [...text.matchAll(/[（(]([^）)]+)[）)]/g)].map((match) => match[1]);
    keywords.push(...parens);
    const cn = text.split(/[（(,，。]/)[0].trim();
    if (cn && cn.length <= 12) keywords.push(cn);
  }
  return [...new Set(keywords.filter(Boolean))];
}

function importedItemMatchesSlot(item, slot) {
  const haystack = normalizeName(`${item?.context || ''} ${item?.name || ''} ${textFromItem(item)}`);
  return (gearSlotAliases[slot] || [slot]).some((alias) => {
    const normalized = normalizeName(alias);
    return normalized && haystack.includes(normalized);
  });
}

function textFromItem(item) {
  const raw = item?.raw || item || {};
  const chunks = [item?.name, item?.context];
  const keys = ['name', 'item', 'baseType', 'typeLine', 'slot', 'category', 'rarity', 'implicitMods', 'explicitMods', 'craftedMods', 'enchantMods', 'fracturedMods', 'mods', 'statRolls', 'properties', 'requirements', 'text', 'rawText'];
  function add(value) {
    if (value === null || value === undefined) return;
    if (typeof value === 'string' || typeof value === 'number') {
      chunks.push(String(value));
      return;
    }
    if (Array.isArray(value)) {
      value.forEach(add);
      return;
    }
    if (typeof value === 'object') {
      for (const key of keys) {
        if (value[key] !== undefined) add(value[key]);
      }
    }
  }
  add(raw);
  return chunks.filter(Boolean).join(' ');
}

function categoriesFromText(text) {
  return Object.entries(gearCategoryPatterns)
    .filter(([, patterns]) => patterns.some((pattern) => pattern.test(text)))
    .map(([category]) => category);
}

function categoriesFromPriorityStat(stat) {
  return categoriesFromText(stat);
}

function itemStatRolls(item) {
  const mods = item.mods || normalizeImportedItem(item.raw || item).mods;
  return item.statRolls || mods.flatMap(extractStatRollsFromMod);
}

function slotRollSummaries(items, expectedCategories) {
  const summaries = [];
  for (const item of items) {
    for (const roll of itemStatRolls(item)) {
      const categories = categoriesFromText(roll.text);
      const matchedCategory = categories.find((category) => expectedCategories.includes(category)) || categories[0];
      if (!matchedCategory) continue;
      summaries.push({
        itemName: item.name,
        category: matchedCategory,
        value: roll.value,
        unit: roll.unit,
        text: roll.text
      });
    }
  }
  summaries.sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
  return summaries.slice(0, 6);
}

function slotThresholdRows(items, expectedCategories) {
  return expectedCategories
    .map((category) => {
      const threshold = gearThresholdDefaults[category];
      if (!threshold) return null;
      const rolls = items.flatMap((item) => itemStatRolls(item)
        .filter((roll) => categoriesFromText(roll.text).includes(category))
        .map((roll) => ({ ...roll, itemName: item.name })));
      const best = rolls.sort((a, b) => b.value - a.value)[0] || null;
      const status = best
        ? best.value >= threshold.min ? 'passed' : 'weak'
        : 'missing';
      return {
        category,
        status,
        threshold: threshold.min,
        unit: threshold.unit,
        value: best?.value ?? null,
        itemName: best?.itemName || '',
        text: best?.text || '',
        source: 'parser-default-threshold'
      };
    })
    .filter(Boolean);
}

function thresholdMinimumValue(row) {
  const text = `${row?.minimum || ''} ${row?.upgradeTarget || ''}`;
  const match = text.match(/\d+(?:\.\d+)?/);
  return match ? Number(match[0]) : null;
}

function bestRollForCategories(items, categories) {
  const categorySet = new Set(categories);
  const rolls = items.flatMap((item) => itemStatRolls(item)
    .filter((roll) => categoriesFromText(roll.text).some((category) => categorySet.has(category)))
    .map((roll) => ({ ...roll, itemName: item.name })));
  return rolls.sort((a, b) => b.value - a.value)[0] || null;
}

function analyzeGearStageReadiness(result, build) {
  const stageTitles = new Map((build.stages || []).map((stage) => [stage.id, stage.title]));
  const stages = (build.gearStatThresholds || []).map((stage) => {
    const rows = (stage.thresholds || []).map((threshold) => {
      const categories = categoriesFromText(`${threshold.stat} ${threshold.minimum} ${threshold.upgradeTarget}`);
      const minimumValue = thresholdMinimumValue(threshold);
      const best = categories.length ? bestRollForCategories(result.items, categories) : null;
      const status = best
        ? minimumValue === null || best.value >= minimumValue ? 'passed' : 'weak'
        : 'missing';
      return {
        stat: threshold.stat,
        categories,
        status,
        minimum: threshold.minimum,
        minimumValue,
        upgradeTarget: threshold.upgradeTarget,
        priority: threshold.priority,
        reason: threshold.reason,
        value: best?.value ?? null,
        unit: best?.unit || '',
        itemName: best?.itemName || '',
        text: best?.text || '',
        source: stage.sourceStatus || 'manual-guide-threshold'
      };
    });
    const passed = rows.filter((row) => row.status === 'passed').length;
    const weak = rows.filter((row) => row.status === 'weak').length;
    const missing = rows.filter((row) => row.status === 'missing').length;
    return {
      stageId: stage.stageId,
      title: stageTitles.get(stage.stageId) || stage.title || stage.stageId,
      sourceStatus: stage.sourceStatus || 'manual-guide-threshold',
      note: stage.note || '',
      rows,
      rowCount: rows.length,
      passed,
      weak,
      missing,
      score: rows.length ? Math.round(passed / rows.length * 100) : 0
    };
  });
  const bestStage = [...stages].sort((a, b) => (
    b.score - a.score
    || b.passed - a.passed
    || a.missing - b.missing
    || String(a.stageId).localeCompare(String(b.stageId))
  ))[0] || null;
  return {
    stages,
    stageCount: stages.length,
    rowCount: stages.reduce((sum, stage) => sum + stage.rowCount, 0),
    passed: stages.reduce((sum, stage) => sum + stage.passed, 0),
    weak: stages.reduce((sum, stage) => sum + stage.weak, 0),
    missing: stages.reduce((sum, stage) => sum + stage.missing, 0),
    bestStageId: bestStage?.stageId || '',
    bestStageTitle: bestStage?.title || '',
    bestStageScore: bestStage?.score || 0,
    sourceStatus: [...new Set(stages.map((stage) => stage.sourceStatus).filter(Boolean))].join(',')
  };
}

function expectedGearCategories(build) {
  const categories = new Set();
  for (const gear of build.gearPriorities || []) {
    for (const stat of gear.priorityStats || []) {
      categoriesFromPriorityStat(stat).forEach((category) => categories.add(category));
    }
  }
  return [...categories];
}

function analyzeGearSlots(result, build) {
  return (build.gearPriorities || []).map((gear) => {
    const expectedCategories = [...new Set((gear.priorityStats || []).flatMap(categoriesFromPriorityStat))];
    const matchedItems = result.items.filter((item) => importedItemMatchesSlot(item, gear.slot));
    const itemCategories = [...new Set(matchedItems.flatMap((item) => categoriesFromText(textFromItem(item))))];
    const rollSummaries = slotRollSummaries(matchedItems, expectedCategories);
    const thresholdRows = slotThresholdRows(matchedItems, expectedCategories);
    const matchedCategories = expectedCategories.filter((category) => itemCategories.includes(category));
    const missingCategories = expectedCategories.filter((category) => !itemCategories.includes(category));
    const score = expectedCategories.length ? matchedCategories.length / expectedCategories.length : 0;
    return {
      slot: gear.slot,
      itemNames: matchedItems.map((item) => item.name),
      hasItem: matchedItems.length > 0,
      expectedCategories,
      matchedCategories,
      missingCategories,
      rollSummaries,
      thresholdRows,
      score
    };
  });
}

      context: item.context,
      categories: categoriesFromText(text),
      mods,
      statRolls,
      text

  const expected = expectedGearCategories(build);
  const matched = expected.filter((category) => detected.includes(category));
  const missing = expected.filter((category) => !detected.includes(category));
  const riskItems = itemAnalyses
    .filter((item) => item.categories.length === 0)
    .map((item) => item.name)
    .slice(0, 8);
  const slotAnalyses = analyzeGearSlots(result, build);
  const slotScoreTotal = slotAnalyses.reduce((sum, slot) => sum + slot.score, 0);
  const thresholdRows = slotAnalyses.flatMap((slot) => slot.thresholdRows || []);
  const stageReadiness = analyzeGearStageReadiness(result, build);
