    matched: matched.length,
    expected: expected.length,
    matchedCategories: matched,
    missingCategories: missing,
    detectedCategories: detected,
    riskItems,
    modCount: itemAnalyses.reduce((sum, item) => sum + item.mods.length, 0),
    statRollCount: itemAnalyses.reduce((sum, item) => sum + item.statRolls.length, 0),
    slots: slotAnalyses,
    slotRollSummaryCount: slotAnalyses.reduce((sum, slot) => sum + slot.rollSummaries.length, 0),
    slotThresholdRows: thresholdRows.length,
    slotThresholdPassed: thresholdRows.filter((row) => row.status === 'passed').length,
    slotThresholdWeak: thresholdRows.filter((row) => row.status === 'weak').length,
    slotThresholdMissing: thresholdRows.filter((row) => row.status === 'missing').length,
    stageReadiness,
    slotMatched: slotAnalyses.filter((slot) => slot.hasItem).length,
    slotExpected: slotAnalyses.length,
    slotAverageScore: slotAnalyses.length ? Math.round(slotScoreTotal / slotAnalyses.length * 100) : 0,
    slotGaps: slotAnalyses.filter((slot) => !slot.hasItem || slot.missingCategories.length > 0)
  };
}

function analyzePassiveStageReadiness(result, build, stageRoutes) {
  const importedPassiveSet = new Set(result.passiveIds || []);
  const routesByStage = new Map((stageRoutes || []).map((route) => [route.stageId, route]));
  const stages = (build.stages || [])
    .filter((stage) => stage.treeStage && routesByStage.has(stage.treeStage))
    .map((stage) => {
      const route = routesByStage.get(stage.treeStage);
      const nodeIds = route.nodeIds || [];
      const matchedIds = nodeIds.filter((id) => importedPassiveSet.has(id));
      const missingIds = nodeIds.filter((id) => !importedPassiveSet.has(id));
      return {
        stageId: stage.id,
        treeStage: stage.treeStage,
        title: stage.title,
        origin: route.origin || '',
        handTuned: Boolean(route.handTuned),
        expected: nodeIds.length,
        matched: matchedIds.length,
        missing: missingIds.length,
        matchedIds,
        missingIds: missingIds.slice(0, 80),
        score: nodeIds.length ? Math.round(matchedIds.length / nodeIds.length * 100) : 0,
        source: 'manifest-route'
      };
    });
  const bestStage = [...stages].sort((a, b) => (
    b.score - a.score
    || b.matched - a.matched
    || b.expected - a.expected
    || String(a.stageId).localeCompare(String(b.stageId))
  ))[0] || null;
  return {
    stages,
    stageCount: stages.length,
    bestStageId: bestStage?.stageId || '',
    bestStageTitle: bestStage?.title || '',
    bestStageScore: bestStage?.score || 0,
    matched: stages.reduce((sum, stage) => sum + stage.matched, 0),
    expected: stages.reduce((sum, stage) => sum + stage.expected, 0),
    missing: stages.reduce((sum, stage) => sum + stage.missing, 0),
    sourceStatus: 'manifest-route'
  };
}

function analyzeBuildProgression(passiveStageReadiness, gearStageReadiness) {
  const passiveBest = (passiveStageReadiness?.stages || []).find((stage) => stage.stageId === passiveStageReadiness.bestStageId) || null;
  const gearBest = (gearStageReadiness?.stages || []).find((stage) => stage.stageId === gearStageReadiness.bestStageId) || null;
  const passiveScore = passiveStageReadiness?.bestStageScore || 0;
  const gearScore = gearStageReadiness?.bestStageScore || 0;
  const bottleneck = passiveScore <= gearScore ? 'passives' : 'gear';
  const reviewStage = bottleneck === 'passives' ? passiveBest : gearBest;
  return {
    sourceStatus: 'parser-stage-heuristic',
    passiveBestStageId: passiveStageReadiness?.bestStageId || '',
    passiveBestStageTitle: passiveStageReadiness?.bestStageTitle || '',
    passiveBestStageScore: passiveScore,
    gearBestStageId: gearStageReadiness?.bestStageId || '',
    gearBestStageTitle: gearStageReadiness?.bestStageTitle || '',
    gearBestStageScore: gearScore,
    bottleneck,
    reviewStageId: reviewStage?.stageId || '',
    reviewStageTitle: reviewStage?.title || '',
    note: 'Heuristic stage guidance from manifest passive routes and manual gear thresholds; review before treating it as final progression advice.'
  };
}

function supportContextsForSkills(result, skillAliases) {
  return result.supports.filter((support) => support.context && nameMatches([support.context], skillAliases));
}

function localizedNameList(items, lang = currentLang) {
  return items.map((item) => item?.[lang] || item?.zhCN || item?.zhTW || item?.en || item).filter(Boolean);
}

function analyzeSupportDecisionMatrix(result, build, expectedSkillAliases, expectedSupportAliases) {
  const rows = build.skills?.supportDecisionMatrix || [];
  const expectedSupportsById = Object.fromEntries(Object.entries(build.skills?.supports || {}).map(([id, name]) => [id, { id, name }]));
  const importedSkillNames = result.skills.map((item) => item.name);
  const importedSupportNames = result.supports.map((item) => item.name);
  const rowResults = rows.map((row) => {
    const rowSkills = (row.skillIds || []).map((skillId) => build.skills?.active?.find((skill) => skill.id === skillId)).filter(Boolean);
    const rowSkillAliases = rowSkills.flatMap((skill) => expectedSkillAliases(skill));
    const contextualSupports = supportContextsForSkills(result, rowSkillAliases);
    const contextualSupportNames = contextualSupports.map((support) => support.name);
    const supportNamesForLinkedCheck = contextualSupportNames.length ? contextualSupportNames : [];
    const matchedSkills = rowSkills.filter((skill) => nameMatches(importedSkillNames, expectedSkillAliases(skill)));
    const missingSkills = rowSkills.filter((skill) => !nameMatches(importedSkillNames, expectedSkillAliases(skill)));
    const firstSupports = (row.firstSupports || []).map((supportId) => expectedSupportsById[supportId]).filter(Boolean);
    const laterSupports = (row.addLater || []).map((supportId) => expectedSupportsById[supportId]).filter(Boolean);
    const matchedFirstSupports = firstSupports.filter((support) => nameMatches(supportNamesForLinkedCheck, expectedSupportAliases(support)));
    const matchedLaterSupports = laterSupports.filter((support) => nameMatches(supportNamesForLinkedCheck, expectedSupportAliases(support)));
    const globallyMatchedFirstSupports = firstSupports.filter((support) => nameMatches(importedSupportNames, expectedSupportAliases(support)));
    const globallyMatchedLaterSupports = laterSupports.filter((support) => nameMatches(importedSupportNames, expectedSupportAliases(support)));
    return {
      id: row.id,
      title: row.title,
      skillMatched: matchedSkills.length,
      skillExpected: rowSkills.length,
      firstSupportMatched: matchedFirstSupports.length,
      firstSupportExpected: firstSupports.length,
      laterSupportMatched: matchedLaterSupports.length,
      laterSupportExpected: laterSupports.length,
      globalFirstSupportMatched: globallyMatchedFirstSupports.length,
      globalLaterSupportMatched: globallyMatchedLaterSupports.length,
      contextualSupportCount: contextualSupports.length,
      hasContextualSupports: contextualSupports.length > 0,
      missingSkills: missingSkills.map((skill) => skill.name),
      missingFirstSupports: firstSupports.filter((support) => !matchedFirstSupports.includes(support)).map((support) => support.name),
      missingLaterSupports: laterSupports.filter((support) => !matchedLaterSupports.includes(support)).map((support) => support.name),
      reviewNote: row.reviewNote
    };
  });
  return {
    rows: rowResults,
    rowCount: rowResults.length,
    skillMatched: rowResults.reduce((sum, row) => sum + row.skillMatched, 0),
    skillExpected: rowResults.reduce((sum, row) => sum + row.skillExpected, 0),
    firstSupportMatched: rowResults.reduce((sum, row) => sum + row.firstSupportMatched, 0),
    firstSupportExpected: rowResults.reduce((sum, row) => sum + row.firstSupportExpected, 0),
    globalFirstSupportMatched: rowResults.reduce((sum, row) => sum + row.globalFirstSupportMatched, 0),
    contextualRows: rowResults.filter((row) => row.hasContextualSupports).length
  };
}

function analyzeMinionSelectionGuide(result, build, expectedSkillAliases, expectedSupportAliases) {
  const guide = build.skills?.minionSelectionGuide;
  const groups = guide?.groups || [];
  const activeById = new Map((build.skills?.active || []).map((skill) => [skill.id, skill]));
  const supportById = new Map(Object.entries(build.skills?.supports || {}).map(([id, name]) => [id, { id, name }]));
  const importedSkillNames = result.skills.map((item) => item.name);
  const importedSupportNames = result.supports.map((item) => item.name);
  const rows = groups.map((group) => {
    const skills = (group.skillIds || []).map((skillId) => activeById.get(skillId)).filter(Boolean);
    const skillAliases = skills.flatMap((skill) => expectedSkillAliases(skill));
    const contextualSupports = supportContextsForSkills(result, skillAliases);
    const contextualSupportNames = contextualSupports.map((support) => support.name);
    const supportsForLinkedCheck = contextualSupportNames.length ? contextualSupportNames : [];
    const firstSupports = (group.firstSupports || []).map((supportId) => supportById.get(supportId)).filter(Boolean);
    const matchedSkills = skills.filter((skill) => nameMatches(importedSkillNames, expectedSkillAliases(skill)));
    const missingSkills = skills.filter((skill) => !nameMatches(importedSkillNames, expectedSkillAliases(skill)));
    const matchedFirstSupports = firstSupports.filter((support) => nameMatches(supportsForLinkedCheck, expectedSupportAliases(support)));
    const globallyMatchedFirstSupports = firstSupports.filter((support) => nameMatches(importedSupportNames, expectedSupportAliases(support)));
    const present = matchedSkills.length > 0;
    const needsReview = group.id === 'main-damage'
      ? matchedSkills.length === 0 || matchedFirstSupports.length === 0
      : present && matchedFirstSupports.length === 0;
    return {
      id: group.id,
      title: group.title,
      job: group.job,
      cutFirst: group.cutFirst,
      present,
      needsReview,
      skillMatched: matchedSkills.length,
      skillExpected: skills.length,
      firstSupportMatched: matchedFirstSupports.length,
      firstSupportExpected: firstSupports.length,
      globalFirstSupportMatched: globallyMatchedFirstSupports.length,
      contextualSupportCount: contextualSupports.length,
      hasContextualSupports: contextualSupports.length > 0,
      matchedSkills: matchedSkills.map((skill) => skill.name),
      missingSkills: missingSkills.map((skill) => skill.name),
      missingFirstSupports: firstSupports.filter((support) => !matchedFirstSupports.includes(support)).map((support) => support.name)
    };
  });
  const presentRows = rows.filter((row) => row.present);
  const mainDamageRows = rows.filter((row) => row.id === 'main-damage');
  const mainDamagePresent = mainDamageRows.some((row) => row.present);
  const extraPresentRows = rows.filter((row) => row.present && row.id !== 'main-damage');
  return {
    title: guide?.title || null,
    rows,
    rowCount: rows.length,
    presentRows: presentRows.length,
    needsReviewCount: rows.filter((row) => row.needsReview).length,
    skillMatched: rows.reduce((sum, row) => sum + row.skillMatched, 0),
    skillExpected: rows.reduce((sum, row) => sum + row.skillExpected, 0),
    firstSupportMatched: rows.reduce((sum, row) => sum + row.firstSupportMatched, 0),
    firstSupportExpected: rows.reduce((sum, row) => sum + row.firstSupportExpected, 0),
    globalFirstSupportMatched: rows.reduce((sum, row) => sum + row.globalFirstSupportMatched, 0),
    contextualRows: rows.filter((row) => row.hasContextualSupports).length,
    mainDamagePresent,
    extraPresentRows: extraPresentRows.length,
    sourceStatus: guide ? 'manual-guide-minion-selection' : ''
  };
}

function analyzeSkillTroubleshooting(result, build, expectedSkillAliases, expectedSupportAliases) {
  const items = build.skills?.troubleshooting || [];
  const activeById = new Map((build.skills?.active || []).map((skill) => [skill.id, skill]));
  const supportById = new Map(Object.entries(build.skills?.supports || {}).map(([id, name]) => [id, { id, name }]));
  const matrixById = new Map((build.skills?.supportDecisionMatrix || []).map((row) => [row.id, row]));
  const importedSkillNames = result.skills.map((item) => item.name);
  const importedSupportNames = result.supports.map((item) => item.name);
  const refInfo = (refId) => {
    const skill = activeById.get(refId);
    if (skill) {
      return {
        id: refId,
        name: skill.name,
        matched: nameMatches(importedSkillNames, expectedSkillAliases(skill)),
        kind: 'skill'
      };
    }
    const support = supportById.get(refId);
    if (support) {
      return {
        id: refId,
        name: support.name,
        matched: nameMatches(importedSupportNames, expectedSupportAliases(support)),
        kind: 'support'
      };
    }
    const matrix = matrixById.get(refId);
    if (matrix) {
      const matrixSkills = (matrix.skillIds || []).map((skillId) => activeById.get(skillId)).filter(Boolean);
      return {
        id: refId,
        name: matrix.title,
        matched: matrixSkills.some((skill) => nameMatches(importedSkillNames, expectedSkillAliases(skill))),
        kind: 'matrix'
      };
    }
    return { id: refId, name: { zhCN: refId, zhTW: refId, en: refId }, matched: false, kind: 'unknown' };
  };
  const rows = items.map((item) => {
    const addRefs = (item.add || []).map(refInfo);
    const cutRefs = (item.cut || []).map(refInfo);
    const missingAdd = addRefs.filter((ref) => !ref.matched);
    const presentCut = cutRefs.filter((ref) => ref.matched);
    const triggered = missingAdd.length > 0 || presentCut.length > 0;
    return {
      id: item.id,
      problem: item.problem,
      note: item.note,
      triggered,
      missingAdd: missingAdd.map((ref) => ref.name),
      presentCut: presentCut.map((ref) => ref.name),
      addMatched: addRefs.length - missingAdd.length,
      addExpected: addRefs.length,
      cutPresent: presentCut.length,
      cutExpected: cutRefs.length
    };
  });
  return {
    rows,
    rowCount: rows.length,
    triggeredCount: rows.filter((row) => row.triggered).length,
    missingAddCount: rows.reduce((sum, row) => sum + row.missingAdd.length, 0),
    presentCutCount: rows.reduce((sum, row) => sum + row.presentCut.length, 0),
    sourceStatus: 'build-guide-troubleshooting'
  };
}

function analyzeGearTroubleshooting(build, gear) {
  const items = build.gearTroubleshooting || [];
  const stagesById = new Map((gear?.stageReadiness?.stages || []).map((stage) => [stage.stageId, stage]));
  const rows = items.map((item) => {
    const stage = stagesById.get(item.stageId);
    const gaps = (stage?.rows || [])
      .filter((row) => row.status !== 'passed')
      .sort((a, b) => (a.priority || 99) - (b.priority || 99))
      .slice(0, 4);
    const triggered = !stage || gaps.length > 0;
    return {
      id: item.id,
      stageId: item.stageId,
      stageTitle: stage?.title || item.stageId,
      problem: item.problem,
      likelyCause: item.likelyCause,
      triggered,
      gapStats: gaps.map((row) => ({
        stat: row.stat,
        status: row.status,
        minimum: row.minimum,
        actual: row.value === null ? '' : `${row.value}${row.unit || ''}`,
        priority: row.priority
      })),
      action: item.gearAction || [],
      doNotDo: item.doNotDo || [],
      stopLine: item.stopLine || '',
      sourceStatus: 'build-guide-gear-troubleshooting'
    };
  });
  return {
    rows,
    rowCount: rows.length,
    triggeredCount: rows.filter((row) => row.triggered).length,
    gapCount: rows.reduce((sum, row) => sum + row.gapStats.length, 0),
    actionCount: rows.reduce((sum, row) => sum + row.action.length, 0),
    stopLineCount: rows.filter((row) => row.stopLine).length,
    sourceStatus: 'build-guide-gear-troubleshooting'
  };
}

function compareWithBuild(result) {
  if (!currentAnalysisContext) return null;
  const { build, endgameNodeIds, stageRoutes, skillCatalog } = currentAnalysisContext;
  const importedSkillNames = result.skills.map((item) => item.name);
  const importedSupportNames = result.supports.map((item) => item.name);
  const importedItemNames = result.items.map((item) => item.name);
  const expectedSkills = build.skills?.active || [];
  const expectedSupports = Object.entries(build.skills?.supports || {}).map(([id, name]) => ({ id, name }));
  const expectedItems = gearKeywords(build);
  const expectedSkillAliases = (skill) => {
    const entry = findCatalogEntryById(skillCatalog, 'active', skill.id);
    return uniqueAliases([
      skill.id,
      ...localizedValues(skill.name),
      ...catalogEntryAliases(entry)
    ]);
  };
  const expectedSupportAliases = (support) => {
    const entry = findCatalogEntryById(skillCatalog, 'support', support.id);
    return uniqueAliases([
      support.id,
      ...localizedValues(support.name),
      ...catalogEntryAliases(entry)
    ]);
  };

  const matchedSkills = expectedSkills.filter((skill) => nameMatches(importedSkillNames, expectedSkillAliases(skill)));
  const missingSkills = expectedSkills.filter((skill) => !nameMatches(importedSkillNames, expectedSkillAliases(skill)));
  const matchedSupports = expectedSupports.filter((support) => nameMatches(importedSupportNames, expectedSupportAliases(support)));
  const missingSupports = expectedSupports.filter((support) => !nameMatches(importedSupportNames, expectedSupportAliases(support)));
  const aliasMatchedSkills = matchedSkills.filter((skill) => !nameMatches(importedSkillNames, localizedValues(skill.name))).length;
  const aliasMatchedSupports = matchedSupports.filter((support) => !nameMatches(importedSupportNames, localizedValues(support.name))).length;
  const matchedItems = expectedItems.filter((item) => nameMatches(importedItemNames, [item]));
  const missingItems = expectedItems.filter((item) => !nameMatches(importedItemNames, [item]));
  const importedPassiveSet = new Set(result.passiveIds);
  const matchedPassiveIds = endgameNodeIds.filter((id) => importedPassiveSet.has(id));
  const missingPassiveIds = endgameNodeIds.filter((id) => !importedPassiveSet.has(id));
  const gear = analyzeGear(result, build);
  const passiveStages = analyzePassiveStageReadiness(result, build, stageRoutes);
  const gearTroubleshooting = analyzeGearTroubleshooting(build, gear);

  return {
    comparedBuildId: build.id,
    comparedBuildTitle: build.title,
    catalog: compareWithCatalog(result, skillCatalog),
    aliasMatchEnabled: Boolean(skillCatalog),
    aliasMatched: aliasMatchedSkills + aliasMatchedSupports,
    skills: {
      matched: matchedSkills.length,
      expected: expectedSkills.length,
      missing: missingSkills.map((skill) => skill.name)
    },
    supports: {
      matched: matchedSupports.length,
      expected: expectedSupports.length,
      missing: missingSupports.map((support) => support.name)
    },
    items: {
      matched: matchedItems.length,
      expected: expectedItems.length,
      missing: missingItems.slice(0, 12)
    },
    gear,
    gearTroubleshooting,
    supportDecision: analyzeSupportDecisionMatrix(result, build, expectedSkillAliases, expectedSupportAliases),
    minionSelection: analyzeMinionSelectionGuide(result, build, expectedSkillAliases, expectedSupportAliases),
    skillTroubleshooting: analyzeSkillTroubleshooting(result, build, expectedSkillAliases, expectedSupportAliases),
    passives: {
      matched: matchedPassiveIds.length,
      expected: endgameNodeIds.length,
      matchedIds: matchedPassiveIds,
      missingIds: missingPassiveIds
    },
    passiveStages,
    progression: analyzeBuildProgression(passiveStages, gear.stageReadiness)
  };
}

async function parseInput(text, mode) {
  const trimmed = text.trim();
  if (!trimmed) throw new Error(i18n[currentLang].emptyInput);
  if (mode === 'json') return { format: 'json', data: tryParseJson(trimmed) };
  if (mode === 'base64-json') return { format: 'base64-json', data: tryParseBase64Json(trimmed) };
  if (mode === 'pob-code') return { format: 'pob-code', data: await tryParsePobCode(trimmed) };
  if (mode === 'pob-xml') return { format: 'pob-xml', data: parsePobXmlText(trimmed) };
  if (mode === 'text') return { format: 'text', data: { rawText: trimmed } };
  try {
    return { format: 'json', data: tryParseJson(trimmed) };
  } catch (_) {
    try {
      return { format: 'base64-json', data: tryParseBase64Json(trimmed) };
    } catch (_) {
      if (looksLikeXml(trimmed)) {
        try {
          return { format: 'pob-xml', data: parsePobXmlText(trimmed) };
        } catch (_) {
          // Fall through to compressed PoB and text probes.
        }
      }
      try {
        return { format: 'pob-code', data: await tryParsePobCode(trimmed) };
      } catch (_) {
        return { format: 'text', data: { rawText: trimmed } };
      }
    }
  }
}

function analyze(parsed, selectedVersion) {
  const data = parsed.data;
  const explicitVersion = findFirst(data, ['version', 'treeVersion', 'leagueVersion', 'gameVersion', 'dataVersion']);
  const resolvedVersion = selectedVersionInfo(explicitVersion || selectedVersion, !explicitVersion);
  const versionCompatibility = buildVersionCompatibility(data, selectedVersion, explicitVersion);
  const character = findFirst(data, ['character']) || data.character || {};
  const skillGroups = collectSkills(data);
  const skills = skillGroups.skills;
  const supports = skillGroups.supports;
  const itemGroups = collectItems(data);
  const items = itemGroups.items;
  const socketedJewels = collectSocketedJewels(items);
  const passiveIds = extractPassiveIds(data);
  const formatProfile = buildFormatProfile(data, parsed, explicitVersion, versionCompatibility, skillGroups, itemGroups, passiveIds);
  const result = {
    parserVersion: 'local-ninja-import-v1',
    schemaVersion: 1,
    parsedAt: new Date().toISOString(),
    format: parsed.format,
    selectedToolVersion: selectedVersion,
    explicitVersion: explicitVersion || null,
    assignedVersion: resolvedVersion.supported ? resolvedVersion.id : (explicitVersion || selectedVersion),
    versionSource: explicitVersion ? 'export' : 'selected-tool-version',
    versionCompatibility,
    character: {
      name: character.name || findFirst(data, ['characterName', 'name']) || null,
      class: character.class || character.className || findFirst(data, ['className']) || null,
      ascendancy: character.ascendancy || character.ascendancyName || findFirst(data, ['ascendancyName']) || null,
      level: character.level || findFirst(data, ['level']) || null
    },
    counts: {
      skills: skills.length,
      supports: supports.length,
      items: items.length,
      socketedJewels: socketedJewels.length,
      passives: passiveIds.length
    },
    skills: skills.slice(0, 40),
    supports: supports.slice(0, 80),
    items: items.slice(0, 40),
    socketedJewels: socketedJewels.slice(0, 20),
    passiveIds: passiveIds.slice(0, 300),
    sourceEvidence: {
      skills: skillGroups.evidence.skillsSource || 'not-detected',
      supports: skillGroups.evidence.supportsSource || 'not-detected',
      items: itemGroups.sourcePath || 'recursive-scan',
      passives: passiveSourceLabel(data, parsed.format) || 'not-detected',
      skillGroupsDetected: skillGroups.evidence.skillGroupsDetected,
      parserHints: formatProfile.parserHints
    },
    formatProfile
  };
  result.analysis = result.versionCompatibility.status === 'unsupported-version' ? null : compareWithBuild(result);
  return result;
}

function fillList(id, values) {

  values.forEach((value) => {

  });

  return `<div class="profile-stat"><strong>${escapeHtml(String(value))}</strong><span>${escapeHtml(label)}</span></div>`;
}

function itemModsForProfile(item) {
  const mods = item.mods || normalizeImportedItem(item.raw || item).mods || [];
  return mods.slice(0, 5);
}

function gemMeta(gem) {
  const t = i18n[currentLang];
  const parts = [];
  if (gem?.raw?.level || gem?.level) parts.push(`${t.profileLevel} ${gem.raw?.level || gem.level}`);
  if (gem?.raw?.quality || gem?.quality) parts.push(`${t.profileQuality} ${gem.raw?.quality || gem.quality}`);
  if (gem?.raw?.enabled === false || gem?.enabled === false) parts.push(t.profileDisabled);
  return parts.join(' / ');
}

function groupedSkillsForProfile(result) {
  const groups = new Map();
  result.skills.forEach((skill) => {
    const key = skill.name || skill.context || i18n[currentLang].skill;
    if (!groups.has(key)) groups.set(key, { name: skill.context || key, active: skill, supports: [] });
    const group = groups.get(key);
    if (!group.active) group.active = skill;
  });
  result.supports.forEach((support) => {
    const key = support.context || i18n[currentLang].support;
    if (!groups.has(key)) groups.set(key, { name: key, active: null, supports: [] });
    groups.get(key).supports.push(support);
  });
  return Array.from(groups.values());
}

function passiveTreeTitle(result) {
  return result.character.name || result.character.ascendancy || result.character.class || 'ninja-import';
}

function commandQuote(value) {
  return `'${String(value).replace(/'/g, `'\\''`)}'`;
}

function archiveSlug(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_.-]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'ninja-import';
}

function markdownText(value, fallback = '-') {
  return String(value ?? fallback)
    .replace(/\r?\n+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim() || fallback;
}

function markdownNameList(items, limit = 8) {
  const names = localizedNameList(items || [], currentLang).slice(0, limit);
  return names.length ? names.map(markdownText).join('、') : '-';
}

function markdownSection(lines, title) {
  const body = lines.filter(Boolean);
  return body.length ? [`## ${title}`, ...body, ''] : [];
}

function reportFileName(result) {
  const character = result?.character?.name || 'unknown';
  return `ninja-report-${result?.assignedVersion || 'unknown'}-${character}.md`.replace(/[^a-z0-9_.-]+/gi, '-');
}

function archiveCandidateFileName(result) {
  const character = result?.character?.name || result?.character?.ascendancy || result?.character?.class || 'unknown';
  return `ninja-${result?.assignedVersion || 'unknown'}-${character}.json`.replace(/[^a-z0-9_.-]+/gi, '-');
}

function archiveSeasonId(result) {
  const dataRoot = result?.versionCompatibility?.selectedDataRoot || currentAnalysisContext?.version?.dataRoot || '';
  const match = String(dataRoot).match(/data\/seasons\/([^/]+)/);
  return match?.[1] || String(document.getElementById('toolVersion').value || 's05').split('-')[0] || 's05';
}

function buildArchivePlan(result) {
  if (!result || result.format === 'none') return null;
  const season = archiveSeasonId(result);
  const key = archiveSlug(result.character?.name || result.character?.ascendancy || result.character?.class || result.assignedVersion);
  const fileName = archiveCandidateFileName(result);
  const candidatePath = `~/Downloads/${fileName}`;
  const quotedFile = commandQuote(candidatePath);
  const quotedKey = commandQuote(key);
  const commands = [
    `node scripts/validate-ninja.mjs --season ${season} --file ${quotedFile} --key ${quotedKey}`,
    `node scripts/archive-ninja-import.mjs --season ${season} --file ${quotedFile} --key ${quotedKey}`,
    `node scripts/archive-ninja-import.mjs --season ${season} --file ${quotedFile} --key ${quotedKey} --write`
  ];
  return { season, key, candidatePath, fileName, commands };
}

function buildMarkdownReport(result) {
  if (!result || result.format === 'none') return '';
  const t = i18n[currentLang];
  const analysis = result.analysis || null;
  const compatibility = result.versionCompatibility || {
    status: result.explicitVersion && result.explicitVersion !== result.selectedToolVersion ? 'needs-review' : 'matched',
    comparedVersion: currentAnalysisContext?.version?.id || result.selectedToolVersion,
    explicitVersion: result.explicitVersion || null,
    warnings: []
  };
  const compatibilityLabel = compatibility.status === 'matched'
    ? t.versionMatched
    : (compatibility.status === 'unsupported-version' ? t.versionUnsupported : (compatibility.status === 'source-version-unknown' ? t.versionUnknown : t.versionMismatch));
  const comparedTitle = analysis
    ? (analysis.comparedBuildTitle?.[currentLang] || analysis.comparedBuildTitle?.zhCN || analysis.comparedBuildId)
    : t.noAnalysis;
  const caution = currentLang === 'en'
    ? 'Conservative local analysis. Treat needs-review lines as checks, not final player advice.'
    : currentLang === 'zhTW'
      ? '本報告是本地保守分析；所有需複核項只代表檢查方向，不等同於玩家實際體感結論。'
      : '本报告是本地保守分析；所有需复核项只代表检查方向，不等同于玩家实际体感结论。';
  const lines = [
    `# ${t.pageTitle} - ${markdownText(result.character?.name || t.unknown)}`,
    '',
    `> ${caution}`,
    ''
  ];

  lines.push(...markdownSection([
    `- ${t.character}：${markdownText(result.character?.name || t.unknown)}`,
    `- ${t.className}：${markdownText(result.character?.class || t.unknown)}`,
    `- ${t.ascendancy}：${markdownText(result.character?.ascendancy || t.unknown)}`,
    `- ${t.level}：${markdownText(result.character?.level || t.unknown)}`,
    `- ${t.counts}：${result.counts.skills} / ${result.counts.supports} / ${result.counts.items} / ${result.counts.passives}`,
    `- ${t.format}：${markdownText(displayImportFormat(result.format))}`
  ], t.summaryTitle));

  lines.push(...markdownSection([
    `- ${t.assignedVersion}：${markdownText(result.assignedVersion)}`,
    `- ${t.comparedVersion}：${markdownText(compatibility.comparedVersion || result.selectedToolVersion)}`,
    `- ${t.explicitVersion}：${markdownText(compatibility.explicitVersion || '-')}`,
    `- ${t.exportSeason}：${markdownText(compatibility.exportSeason || '-')} / ${markdownText(compatibility.selectedSeason || '-')}`,
    `- ${t.exportPoe2dbVersion}：${markdownText(compatibility.exportPoe2dbVersion || '-')} / ${markdownText(compatibility.selectedPoe2dbVersion || '-')}`,
    `- ${t.versionCompatibility}：${markdownText(compatibilityLabel)}`,
    `- ${t.formatProfile}：${markdownText([result.formatProfile?.skillGroupPath, result.formatProfile?.itemSourcePath, result.formatProfile?.passiveSourcePath].filter(Boolean).map(displayParserPath).join(' / ') || t.unknown)}`,
    `- ${t.parserHints}：${markdownText((result.formatProfile?.parserHints || []).map(displayParserToken).join('、') || t.noVersionWarnings)}`,
    `- ${t.formatRisks}：${markdownText((result.formatProfile?.risks || []).map(displayParserToken).join('、') || t.noVersionWarnings)}`,
    `- ${t.versionCompatibility}：${compatibility.warnings?.length ? markdownText(compatibility.warnings.map(displayCompatibilityWarning).join('、')) : t.noVersionWarnings}`
  ], t.versionTitle));

  if (analysis) {
    const passivePercent = analysis.passives.expected ? Math.round(analysis.passives.matched / analysis.passives.expected * 100) : 0;
    const progression = analysis.progression;
    const bottleneckLabel = progression?.bottleneck === 'passives' ? t.bottleneckPassives : t.bottleneckGear;
    const bestPassiveStage = analysis.passiveStages?.stages?.find((stage) => stage.stageId === analysis.passiveStages.bestStageId) || null;
    const bestPassiveStageHref = bestPassiveStage
      ? stageTreeUrl(analysis.comparedBuildId, bestPassiveStage.treeStage || bestPassiveStage.stageId)
      : '';
    const missingPassiveIds = analysis.passives.missingIds || [];
    const missingPassiveHref = missingPassiveIds.length ? nodeTreeUrl(missingPassiveIds, `${passiveTreeTitle(result)}-missing-passives`) : '';
    const bestPassiveStageMissingHref = bestPassiveStage?.missingIds?.length
      ? nodeTreeUrl(bestPassiveStage.missingIds, `${passiveTreeTitle(result)}-${bestPassiveStage.stageId}-missing`)
      : '';

    lines.push(...markdownSection([
      `- ${t.analysisBuild}：${markdownText(comparedTitle)}`,
      `- ${t.analysisSkillMatch}：${analysis.skills.matched} / ${analysis.skills.expected}`,
      `- ${t.analysisSupportMatch}：${analysis.supports.matched} / ${analysis.supports.expected}`,
      `- ${t.analysisItemMatch}：${analysis.items.matched} / ${analysis.items.expected}`,
      `- ${t.gearCategoryMatch}：${analysis.gear?.matched || 0} / ${analysis.gear?.expected || 0}`,
      `- ${t.gearSlotCoverage}：${analysis.gear?.slotMatched || 0} / ${analysis.gear?.slotExpected || 0}`,
      `- ${t.analysisPassiveMatch}：${analysis.passives.matched} / ${analysis.passives.expected} (${passivePercent}%)`,
      `- ${t.analysisMissingSkills}：${markdownNameList(analysis.skills.missing)}`,
      `- ${t.analysisMissingSupports}：${markdownNameList(analysis.supports.missing)}`,
      `- ${t.analysisMissingItems}：${markdownText((analysis.items.missing || []).slice(0, 8).join('、') || '-')}`
    ], t.analysisTitle));

    lines.push(...markdownSection([
      progression ? `- ${t.progressionSuggestion}：${t.bottleneckPassives} ${markdownText(progression.passiveBestStageTitle || '-')} ${progression.passiveBestStageScore || 0}% / ${t.bottleneckGear} ${markdownText(progression.gearBestStageTitle || '-')} ${progression.gearBestStageScore || 0}%` : '',
      progression ? `- ${t.progressionBottleneck}：${markdownText(bottleneckLabel)}；${t.progressionReviewStage} ${markdownText(progression.reviewStageTitle || '-')}` : '',
      analysis.gear?.stageReadiness ? `- ${t.gearStageReadiness}：${analysis.gear.stageReadiness.passed || 0} / ${analysis.gear.stageReadiness.rowCount || 0}；${t.gearStageReadinessBest} ${markdownText(analysis.gear.stageReadiness.bestStageTitle || '-')} ${analysis.gear.stageReadiness.bestStageScore || 0}%` : '',
      analysis.passiveStages ? `- ${t.passiveStageReadiness}：${analysis.passiveStages.matched || 0} / ${analysis.passiveStages.expected || 0}；${t.passiveStageReadinessBest} ${markdownText(analysis.passiveStages.bestStageTitle || '-')} ${analysis.passiveStages.bestStageScore || 0}%` : '',
      bestPassiveStageHref ? `- ${t.openBestPassiveStage}：${bestPassiveStageHref}` : '',
      bestPassiveStageMissingHref ? `- ${t.openBestStageMissingPassives}：${bestPassiveStageMissingHref}` : '',
      missingPassiveHref ? `- ${t.openMissingPassives}：${missingPassiveHref}` : ''
    ], t.progressionSuggestion));

    const skillRows = analysis.skillTroubleshooting?.rows || [];
    const minionRows = analysis.minionSelection?.rows || [];
    lines.push(...markdownSection([
      analysis.minionSelection ? `- ${t.minionSelectionGuide}：${analysis.minionSelection.presentRows} / ${analysis.minionSelection.rowCount}；${t.minionSelectionSkillMatch} ${analysis.minionSelection.skillMatched} / ${analysis.minionSelection.skillExpected}；source=${markdownText(analysis.minionSelection.sourceStatus)}` : '',
      analysis.minionSelection ? `- ${t.minionSelectionFirstSupportMatch}：${analysis.minionSelection.firstSupportMatched} / ${analysis.minionSelection.firstSupportExpected}；${t.supportMatrixGlobalMatch} ${analysis.minionSelection.globalFirstSupportMatched}` : '',
      ...minionRows.filter((row) => row.needsReview).slice(0, 6).map((row) => (
        `- ${markdownText(localizedText(row.title, row.id))}：needs-review；${t.analysisMissingSkills} ${markdownNameList(row.missingSkills, 5)}；${t.analysisMissingSupports} ${markdownNameList(row.missingFirstSupports, 5)}；${t.minionSelectionCutRule} ${markdownText(localizedText(row.cutFirst, '-'))}`
      ))
    ], t.minionSelectionGuide));

    lines.push(...markdownSection([
      analysis.skillTroubleshooting ? `- ${t.skillTroubleshooting}：${analysis.skillTroubleshooting.triggeredCount} / ${analysis.skillTroubleshooting.rowCount}；source=${markdownText(analysis.skillTroubleshooting.sourceStatus)}` : '',
      ...skillRows.filter((row) => row.triggered).slice(0, 6).map((row) => (
        `- ${markdownText(localizedText(row.problem, row.id))}：needs-review；${t.skillTroubleshootingMissingAdd} ${markdownNameList(row.missingAdd, 5)}；${t.skillTroubleshootingPresentCut} ${markdownNameList(row.presentCut, 5)}`
      ))
    ], t.skillTroubleshooting));

    const gearRows = analysis.gearTroubleshooting?.rows || [];
    lines.push(...markdownSection([
      analysis.gearTroubleshooting ? `- ${t.gearTroubleshooting}：${analysis.gearTroubleshooting.triggeredCount} / ${analysis.gearTroubleshooting.rowCount}；source=${markdownText(analysis.gearTroubleshooting.sourceStatus)}` : '',
      ...gearRows.filter((row) => row.triggered).slice(0, 6).map((row) => {
        const gaps = (row.gapStats || []).slice(0, 4).map((gap) => {
          const actual = gap.actual || t.thresholdMissing;
          const status = gap.status === 'weak' ? t.thresholdWeak : t.thresholdMissing;
          return `${gap.stat} ${actual} / ${gap.minimum} ${status}`;
        }).join('、') || '-';
        const actions = (row.action || []).slice(0, 4).map((item) => localizedText(item, item)).join('、') || '-';
        const stopLine = localizedText(row.stopLine, '');
        return `- ${markdownText(localizedText(row.problem, row.id))}：needs-review；${t.gearTroubleshootingGaps} ${markdownText(gaps)}；${t.gearTroubleshootingActions} ${markdownText(actions)}${stopLine ? `；${t.gearTroubleshootingStopLine} ${markdownText(stopLine)}` : ''}`;
      })
    ], t.gearTroubleshooting));

    const plan = buildArchivePlan(result);
    lines.push(...markdownSection([
      plan ? `- ${t.archivePlanKey}：${markdownText(plan.key)}` : '',
      plan ? `- ${t.archivePlanCandidate}：${markdownText(plan.candidatePath)}` : '',
      plan ? `- ${t.archivePlanSafety}：${markdownText(t.archivePlanSafetyText)}` : '',
      plan ? '```sh' : '',
      plan ? plan.commands.join('\n') : '',
      plan ? '```' : ''
    ], t.archivePlanTitle));
  } else {
    lines.push(...markdownSection([`- ${t.noAnalysis}`], t.analysisTitle));
  }

  return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
}

function updateMarkdownReportDataset(result) {
  const report = buildMarkdownReport(result);
  const sections = (report.match(/^## /gm) || []).length;
  const reportBlock = document.getElementById('reportMarkdownBlock');
  const copyButton = document.getElementById('copyReportBtn');
  if (reportBlock) reportBlock.textContent = report || i18n[currentLang].waiting;
  if (copyButton) {
    copyButton.classList.toggle('disabled', !report);
    copyButton.setAttribute('aria-disabled', String(!report));
  }
  const copyStatus = document.getElementById('reportCopyStatus');
  if (copyStatus) copyStatus.textContent = '';
  document.body.dataset.ninjaReportReady = report ? 'true' : 'false';
  document.body.dataset.ninjaReportFormat = report ? 'markdown' : '';
  document.body.dataset.ninjaReportLineCount = report ? String(report.trim().split(/\r?\n/).length) : '0';
  document.body.dataset.ninjaReportSectionCount = String(sections);
  document.body.dataset.ninjaReportFileName = report ? reportFileName(result) : '';
  document.body.dataset.ninjaReportPreviewChars = String(report.length);
  if (!report) document.body.dataset.ninjaReportCopyStatus = '';
}

function renderArchivePlan(result) {
  const t = i18n[currentLang];
  const plan = buildArchivePlan(result);
  const commandBlock = document.getElementById('archiveCommandBlock');
  const copyButton = document.getElementById('copyArchiveCommandBtn');
  if (!plan) {
    fillList('archivePlanResult', [t.waiting]);
    if (commandBlock) commandBlock.textContent = '# waiting for parsed import';
    if (copyButton) {
      copyButton.classList.add('disabled');
      copyButton.setAttribute('aria-disabled', 'true');
    }
    document.body.dataset.ninjaArchivePlanReady = 'false';
    document.body.dataset.ninjaArchivePlanKey = '';
    document.body.dataset.ninjaArchivePlanSeason = '';
    document.body.dataset.ninjaArchivePlanCandidate = '';
    document.body.dataset.ninjaArchivePlanCommandCount = '0';
    return;
  }
  fillList('archivePlanResult', [
    `${t.archivePlanKey}：<code>${escapeHtml(plan.key)}</code>`,
    `${t.archivePlanSeason}：<code>${escapeHtml(plan.season)}</code>`,
    `${t.archivePlanCandidate}：<code>${escapeHtml(plan.candidatePath)}</code>`,
    `${t.archivePlanSafety}：${escapeHtml(t.archivePlanSafetyText)}`,
    `<span class="warn">${escapeHtml(t.archivePlanNeedsExport)}</span>`
  ]);
  if (commandBlock) commandBlock.textContent = plan.commands.join('\n');
  if (copyButton) {
    copyButton.classList.remove('disabled');
    copyButton.setAttribute('aria-disabled', 'false');
  }
  document.body.dataset.ninjaArchivePlanReady = 'true';
  document.body.dataset.ninjaArchivePlanKey = plan.key;
  document.body.dataset.ninjaArchivePlanSeason = plan.season;
  document.body.dataset.ninjaArchivePlanCandidate = plan.candidatePath;
  document.body.dataset.ninjaArchivePlanCommandCount = String(plan.commands.length);
}

  return url.toString();
}

}

function passiveTreeUrl(result) {
  const url = new URL(nodeTreeUrl(result.passiveIds, passiveTreeTitle(result)));
  if (result.assignedVersion) url.searchParams.set('version', result.assignedVersion);
  const treeClass = importedTreeClassParams(result.character);
  if (treeClass) {
    url.searchParams.set('classId', String(treeClass.classId));
    url.searchParams.set('ascendancyId', String(treeClass.ascendancyId));
    url.searchParams.set('alternateAscendancyId', String(treeClass.alternateAscendancyId || 0));
  }
  return url.toString();
}

function updatePassiveTreeButton(result) {
  const button = document.getElementById('openPassiveTreeBtn');
  const t = i18n[currentLang];
  const hasNodes = Boolean(result?.passiveIds?.length);
  const unsupported = result?.versionCompatibility?.status === 'unsupported-version';
  const canOpen = hasNodes && !unsupported;
  if (canOpen) {
    const href = passiveTreeUrl(result);
    if (button) button.href = href;
    document.body.dataset.parsedPassiveTreeHref = href;
    document.body.dataset.parsedPassiveTreeNodeCount = String(result.passiveIds.length);
  } else {
    delete document.body.dataset.parsedPassiveTreeHref;
    document.body.dataset.parsedPassiveTreeNodeCount = '0';
  }
  if (!button) return;
  button.textContent = unsupported ? t.versionUnsupported : (hasNodes ? t.openPassiveTree : t.noPassiveTree);
  button.classList.toggle('disabled', !canOpen);
  button.setAttribute('aria-disabled', String(!canOpen));
  button.dataset.passiveNodeCount = String(result?.passiveIds?.length || 0);
  button.dataset.versionSupported = String(!unsupported);
  if (!canOpen) button.href = '../tools/passive-tree.html';
}

function setLanguage(lang) {
  currentLang = lang;
  const t = i18n[currentLang];
  document.documentElement.lang = lang === 'en' ? 'en' : lang === 'zhTW' ? 'zh-Hant' : 'zh-CN';
  document.title = t.documentTitle;
  document.querySelectorAll('[data-i18n]').forEach((node) => {
    node.textContent = t[node.dataset.i18n] || node.textContent;
  });
  document.querySelectorAll('[data-i18n-option]').forEach((node) => {
    node.textContent = t[node.dataset.i18nOption] || node.textContent;
  });
  document.querySelectorAll('[data-i18n-aria]').forEach((node) => {
    node.setAttribute('aria-label', t[node.dataset.i18nAria] || node.getAttribute('aria-label') || '');
  });
  document.getElementById('input').placeholder = t.inputPlaceholder;
  document.querySelectorAll('[data-lang]').forEach((button) => {
    button.classList.toggle('active', button.dataset.lang === lang);
  });
  document.body.dataset.ninjaLang = currentLang;
  document.body.dataset.ninjaUiLocalized = 'true';
  if (compareBuildOptions.length && currentAnalysisContext?.build?.id) {
    fillCompareBuildSelect(currentAnalysisContext.build.id);
  }
  updatePassiveTreeButton(currentResult);
  renderNinjaArchiveList();
  if (currentResult) render(currentResult);
}

function loadArchivedImport(key) {
  const row = archivedImportRows.find((item) => item.key === key);
  if (!row?.data) return;
  const loaded = {
    ...row.data,
    analysis: compareWithBuild(row.data)
  };
  document.getElementById('input').value = JSON.stringify(row.data, null, 2);
  document.getElementById('sourceType').value = 'json';
  render(loaded);
  document.body.dataset.ninjaArchiveLoadedKey = key;
  document.body.dataset.ninjaArchiveLoadedFormat = row.data.format || '';
}

function downloadCurrentResult() {
  if (!currentResult || currentResult.format === 'none') {
    window.alert(i18n[currentLang].exportEmpty);
    return;
  }
  const character = currentResult.character.name || 'unknown';
  const fileName = `ninja-${currentResult.assignedVersion}-${character}.json`.replace(/[^a-z0-9_.-]+/gi, '-');
  const blob = new Blob([JSON.stringify(currentResult, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = fileName;
  link.click();
  URL.revokeObjectURL(url);
}

function downloadCurrentReport() {
  if (!currentResult || currentResult.format === 'none') {
    window.alert(i18n[currentLang].exportEmpty);
    return;
  }
  const report = buildMarkdownReport(currentResult);
  const fileName = reportFileName(currentResult);
  const blob = new Blob([report], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = fileName;
  link.click();
  URL.revokeObjectURL(url);
  updateMarkdownReportDataset(currentResult);
}

async function copyText(value) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(value);
    return;
  }
  const textarea = document.createElement('textarea');
  textarea.value = value;
  textarea.setAttribute('readonly', '');
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  const copied = document.execCommand('copy');
  textarea.remove();
  if (!copied) throw new Error('copy failed');
}

async function copyCurrentReport() {
  if (!currentResult || currentResult.format === 'none') return;
  const report = buildMarkdownReport(currentResult);
  if (!report) return;
  const status = document.getElementById('reportCopyStatus');
  try {
    await copyText(report);
    status.textContent = i18n[currentLang].copyReportDone;
    document.body.dataset.ninjaReportCopyStatus = 'copied';
  } catch (error) {
    status.textContent = i18n[currentLang].copyReportFailed;
    document.body.dataset.ninjaReportCopyStatus = 'failed';
  }
}

document.getElementById('parseBtn').addEventListener('click', async () => {
  try {
    const parsed = await parseInput(document.getElementById('input').value, document.getElementById('sourceType').value);
    const selectedVersion = document.getElementById('toolVersion').value;
    const explicitVersion = findFirst(parsed.data, ['version', 'treeVersion', 'leagueVersion', 'gameVersion', 'dataVersion']);
    const resolvedVersion = explicitVersion
      ? window.POE2Versions.findVersion(loadedVersions, explicitVersion)
      : window.POE2Versions.resolveVersion(loadedVersions, selectedVersion);
    if (resolvedVersion && (!currentAnalysisContext || currentAnalysisContext.version?.id !== resolvedVersion.id)) {
      await loadAnalysisContext(loadedVersions, resolvedVersion.id);
    }
    render(analyze(parsed, selectedVersion));
  } catch (error) {
    const t = i18n[currentLang];
    currentResult = null;
    fillList('versionResult', [`<span class="warn">${t.parseFailed}：${escapeHtml(error.message)}</span>`]);
    fillList('summaryResult', [t.checkFormat]);
    fillList('skillResult', [t.noParse]);
    fillList('supportResult', [t.noParse]);
    fillList('itemResult', [t.noParse]);
    fillList('analysisResult', [t.noParse]);
    renderProfileView({
      format: 'none',
      counts: { skills: 0, supports: 0, items: 0, passives: 0 },
      skills: [],
      supports: [],
      items: [],
      passiveIds: [],
      analysis: null
    });
    const rawResult = document.getElementById('rawResult');
    if (rawResult) rawResult.textContent = '{}';
  }
});

  if (event.currentTarget.getAttribute('aria-disabled') === 'true') return;
  const text = document.getElementById('archiveCommandBlock')?.textContent || '';
  if (!text.trim() || text.startsWith('# waiting')) return;
  await navigator.clipboard?.writeText(text);
